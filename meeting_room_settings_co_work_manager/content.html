<div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6 sm:mb-8">
    <div>
        <h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg font-bold text-on-surface">Rooms Settings</h2>
        <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Manage meeting rooms, creative hubs, podcast studios, capacities, and specs.</p>
    </div>
    <div class="flex gap-2 w-full sm:w-auto">
        <button onclick="openRoomModal()" class="flex items-center gap-2 bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md text-label-md hover:bg-primary/90 transition-colors justify-center flex-1 sm:flex-initial shadow-sm">
            <span class="material-symbols-outlined text-[18px]">add</span> Add Room
        </button>
    </div>
</div>

<!-- Grid Layout -->
<div id="roomGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    <!-- Dynamic room cards will be rendered here -->
</div>

<!-- Add/Edit Room Modal -->
<div id="roomModalOverlay" class="fixed inset-0 bg-surface-variant/85 backdrop-blur-xs z-[100] hidden opacity-0 transition-opacity duration-300" onclick="closeRoomModal()"></div>
<div id="roomModal" class="fixed inset-y-0 right-0 w-full sm:w-[500px] bg-surface-container-lowest shadow-level-5 z-[101] transform translate-x-full transition-transform duration-300 hidden flex flex-col h-full rounded-l-2xl border-l border-outline-variant">
    
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-lg border-b border-outline-variant shrink-0 bg-surface-bright">
        <div>
            <h3 id="roomModalTitle" class="font-headline-md font-bold text-on-surface">Add Room</h3>
            <p class="font-body-sm text-on-surface-variant mt-1">Configure meeting room details</p>
        </div>
        <button onclick="closeRoomModal()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-low text-on-surface transition-colors" aria-label="Close modal">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <!-- Modal Body -->
    <div class="p-lg overflow-y-auto flex-1 bg-surface-container-lowest">
        <form id="roomForm" onsubmit="saveRoom(event)" class="flex flex-col gap-xl">
            <input type="hidden" id="roomId">
            
            <!-- Basic Details -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Basic Details</h4>
                <div class="grid grid-cols-1 gap-md">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Room Name <span class="text-error">*</span></label>
                        <input type="text" id="roomName" required class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. The Boardroom, Podcast Studio">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Location <span class="text-error">*</span></label>
                        <input type="text" id="roomLocation" required class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. Level 2, North Wing">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Parent Workspace Zone <span class="text-error">*</span></label>
                        <select id="roomParentWorkspace" required class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface">
                            <option value="">Select Parent Workspace...</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Capacity & Size -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Capacity & Size</h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Capacity (People) <span class="text-error">*</span></label>
                        <input type="number" id="roomCapacity" required min="1" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. 12">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Size (sq ft) <span class="text-error">*</span></label>
                        <input type="number" id="roomSize" required min="10" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. 400">
                    </div>
                </div>
            </div>

            <!-- Amenities -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Amenities</h4>
                <div class="flex flex-wrap gap-3">
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="High-Speed WiFi" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">wifi</span>
                        <span class="font-body-sm text-on-surface">High-Speed WiFi</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="TV" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">tv</span>
                        <span class="font-body-sm text-on-surface">Smart TV / Display</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="Video Conf" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">video_camera_front</span>
                        <span class="font-body-sm text-on-surface">Video Conf</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="Whiteboard" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">architecture</span>
                        <span class="font-body-sm text-on-surface">Whiteboard</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="Phone" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">phone</span>
                        <span class="font-body-sm text-on-surface">Conference Phone</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="Soundproof" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">volume_off</span>
                        <span class="font-body-sm text-on-surface">Soundproof</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="room_amenities" value="Pro Audio Gear" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">mic</span>
                        <span class="font-body-sm text-on-surface">Pro Audio Gear</span>
                    </label>
                </div>
            </div>

            <!-- Status -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Status & Visuals</h4>
                <div class="grid grid-cols-1 gap-md">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Status <span class="text-error">*</span></label>
                        <select id="roomStatus" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface">
                            <option value="Active">Active</option>
                            <option value="Maintenance">Maintenance</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Image URL (Optional)</label>
                        <input type="url" id="roomImage" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="https://example.com/room.jpg">
                    </div>
                </div>
            </div>

            <button type="submit" class="hidden" id="roomFormSubmitBtn"></button>
        </form>
    </div>
    
    <!-- Footer Actions -->
    <div class="p-md border-t border-outline-variant bg-surface flex gap-sm mt-auto justify-end rounded-bl-2xl shrink-0">
        <button type="button" class="px-6 py-2 border border-outline-variant rounded-lg font-label-md text-on-surface hover:bg-surface-container-low transition-colors shadow-sm" onclick="closeRoomModal()">Cancel</button>
        <button type="button" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary/90 transition-colors shadow-sm" onclick="triggerRoomFormSubmit()">Save Room</button>
    </div>
</div>

<script>
(function() {
    let rooms = [];

    async function loadRooms() {
        let stored = sessionStorage.getItem("rooms_list");
        if (stored) {
            const parsed = JSON.parse(stored);
            if (!parsed.some(r => r.parentWorkspace === "Nichi-In Workspace 1 (Int)")) {
                stored = null;
            }
        }
        if (!stored) {
            try {
                const res = await fetch("../member/data/rooms.json");
                const data = await res.json();
                sessionStorage.setItem("rooms_list", JSON.stringify(data));
                stored = JSON.stringify(data);
            } catch (e) {
                console.error("Failed to fetch rooms seed data", e);
                stored = "[]";
            }
        }
        rooms = JSON.parse(stored);
        renderRooms();
    }

    function renderRooms() {
        const grid = document.getElementById("roomGrid");
        if (!grid) return;

        if (rooms.length === 0) {
            grid.innerHTML = `<div class="col-span-full py-12 text-center text-on-surface-variant font-body-md">No meeting rooms registered. Click "Add Room" to create one.</div>`;
            return;
        }

        const workspaces = JSON.parse(sessionStorage.getItem("workspaces") || "[]");

        grid.innerHTML = rooms.map(r => {
            let statusBadge = `<div class="absolute top-4 right-4 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-secondary"></span> Active</div>`;
            if (r.status === "Maintenance") {
                statusBadge = `<div class="absolute top-4 right-4 bg-error-container text-on-error-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-error"></span> Maintenance</div>`;
            } else if (r.status === "Inactive") {
                statusBadge = `<div class="absolute top-4 right-4 bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-outline-variant"></span> Inactive</div>`;
            }

            const imgUrl = r.image || "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80";

            const parent = workspaces.find(w => w.name === r.parentWorkspace);
            const clientType = parent ? parent.clientType : "Internal";

            return `
                <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col group relative">
                    <div class="h-48 w-full relative bg-surface-container-low shrink-0">
                        <img src="${imgUrl}" alt="${r.name}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-primary text-on-primary px-3 py-1 rounded-lg font-label-sm text-xs shadow-sm font-semibold uppercase tracking-wider z-10">${clientType}</div>
                        ${statusBadge}
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between">
                        <div class="mb-4">
                            <h3 class="font-headline-sm text-headline-sm text-on-surface font-bold leading-tight break-words">${r.name.replace(/\s*\((Int|Ext)\)/i, "")}</h3>
                            <p class="font-body-sm text-body-sm text-on-surface-variant mt-2 flex items-start gap-1">
                                <span class="material-symbols-outlined text-[16px] mt-0.5 shrink-0 text-outline-variant">location_on</span>
                                <span class="leading-normal break-words">${r.location}</span>
                            </p>
                        </div>
                        <div class="flex items-center gap-6 mb-6 font-body-sm text-body-sm text-on-surface-variant">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-outline text-[18px]">group</span>
                                <span class="font-semibold">${r.capacity} Capacity</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-outline text-[18px]">square_foot</span>
                                <span class="font-semibold">${r.size || 150} sq ft</span>
                            </div>
                        </div>
                        <div class="mt-auto">
                            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2 font-semibold">Amenities</p>
                            <div class="flex flex-wrap gap-1.5">
                                ${r.amenities && r.amenities.length > 0 
                                    ? r.amenities.map(a => `<span class="bg-surface-variant/40 text-on-surface-variant border border-outline-variant/50 text-[11px] px-2.5 py-1 rounded-lg font-medium">${a}</span>`).join("")
                                    : `<span class="text-xs italic text-on-surface-variant">No amenities listed</span>`
                                }
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-outline-variant/40 bg-surface-bright/50 px-6 py-3 flex justify-end gap-2 shrink-0">
                        <button onclick="openRoomModal(${r.id})" class="flex items-center gap-1 text-primary hover:bg-primary/10 transition-colors px-3 py-1.5 rounded-lg font-label-md text-sm">
                            <span class="material-symbols-outlined text-[18px]">edit</span> Edit
                        </button>
                        <button onclick="deleteRoom(${r.id})" class="flex items-center gap-1 text-error hover:bg-error/10 transition-colors px-3 py-1.5 rounded-lg font-label-md text-sm">
                            <span class="material-symbols-outlined text-[18px]">delete</span> Delete
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    function openRoomModal(id = null) {
        const modal = document.getElementById('roomModal');
        const overlay = document.getElementById('roomModalOverlay');
        const title = document.getElementById('roomModalTitle');
        const form = document.getElementById('roomForm');
        
        document.querySelectorAll('input[name="room_amenities"]').forEach(cb => cb.checked = false);

        // Populate parent workspaces options
        const workspaces = JSON.parse(sessionStorage.getItem("workspaces") || "[]");
        const parents = workspaces.filter(w => !w.parentWorkspace && w.status === "Active");
        const parentSelect = document.getElementById("roomParentWorkspace");
        if (parentSelect) {
            parentSelect.innerHTML = `<option value="">Select Parent Workspace...</option>` +
                parents.map(w => `<option value="${w.name}">${w.name.replace(/\s*\((Int|Ext)\)/i, "")} (${w.clientType})</option>`).join("");
        }

        if (id) {
            const r = rooms.find(x => x.id === id);
            if (r) {
                title.innerText = 'Edit Room';
                document.getElementById('roomId').value = r.id;
                document.getElementById('roomName').value = r.name;
                document.getElementById('roomLocation').value = r.location;
                document.getElementById('roomCapacity').value = r.capacity;
                document.getElementById('roomSize').value = r.size || 150;
                document.getElementById('roomStatus').value = r.status || 'Active';
                document.getElementById('roomImage').value = r.image || '';
                
                if (parentSelect) parentSelect.value = r.parentWorkspace || '';

                if (r.amenities) {
                    r.amenities.forEach(a => {
                        const cb = document.querySelector(`input[name="room_amenities"][value="${a}"]`);
                        if (cb) cb.checked = true;
                    });
                }
            }
        } else {
            title.innerText = 'Add Room';
            form.reset();
            document.getElementById('roomId').value = '';
            if (parentSelect) parentSelect.value = '';
        }
        
        modal.classList.remove('hidden');
        overlay.classList.remove('hidden');
        
        setTimeout(() => {
            modal.classList.remove('translate-x-full');
            overlay.classList.remove('opacity-0');
        }, 10);
        
        document.body.style.overflow = 'hidden';
    }

    function closeRoomModal() {
        const modal = document.getElementById('roomModal');
        const overlay = document.getElementById('roomModalOverlay');
        
        modal.classList.add('translate-x-full');
        overlay.classList.add('opacity-0');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            overlay.classList.add('hidden');
            document.body.style.overflow = '';
        }, 300);
    }

    function triggerRoomFormSubmit() {
        document.getElementById("roomFormSubmitBtn").click();
    }
    
    function saveRoom(e) {
        e.preventDefault();
        
        const idVal = document.getElementById('roomId').value;
        const name = document.getElementById('roomName').value.trim();
        const location = document.getElementById('roomLocation').value.trim();
        const parentWorkspace = document.getElementById('roomParentWorkspace').value;
        const capacity = parseInt(document.getElementById('roomCapacity').value);
        const size = parseInt(document.getElementById('roomSize').value);
        const status = document.getElementById('roomStatus').value;
        const image = document.getElementById('roomImage').value.trim();

        const amenities = Array.from(document.querySelectorAll('input[name="room_amenities"]:checked')).map(cb => cb.value);

        if (!name || !location || !parentWorkspace || isNaN(capacity) || isNaN(size)) {
            alert("Please fill in all required fields.");
            return;
        }

        if (idVal) {
            const idx = rooms.findIndex(x => x.id === parseInt(idVal));
            if (idx !== -1) {
                rooms[idx] = {
                    ...rooms[idx],
                    name,
                    location,
                    parentWorkspace,
                    capacity,
                    size,
                    status,
                    image,
                    amenities
                };
                alert('Room updated successfully!');
            }
        } else {
            const newId = rooms.length > 0 ? Math.max(...rooms.map(x => x.id)) + 1 : 1;
            const newRoom = {
                id: newId,
                name,
                location,
                parentWorkspace,
                capacity,
                size,
                status,
                image,
                amenities
            };
            rooms.unshift(newRoom);
            alert('Room added successfully!');
        }

        sessionStorage.setItem("rooms_list", JSON.stringify(rooms));
        renderRooms();
        closeRoomModal();
    }
    
    function deleteRoom(id) {
        if (confirm("Are you sure you want to delete this room? This action cannot be undone.")) {
            rooms = rooms.filter(x => x.id !== id);
            sessionStorage.setItem("rooms_list", JSON.stringify(rooms));
            renderRooms();
            alert("Room deleted successfully.");
        }
    }

    // Initialize Page
    loadRooms();

    // Expose handlers globally for SPA inline event handlers
    window.openRoomModal = openRoomModal;
    window.closeRoomModal = closeRoomModal;
    window.saveRoom = saveRoom;
    window.deleteRoom = deleteRoom;
    window.triggerRoomFormSubmit = triggerRoomFormSubmit;
})();
</script>
