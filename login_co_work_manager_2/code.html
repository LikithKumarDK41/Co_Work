<body class="bg-background min-h-screen text-on-background font-body-md antialiased overflow-hidden">
<div class="relative min-h-screen flex items-center justify-center p-md">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A bright, modern, high-end coworking space with glass partitions, sleek wooden desks, and ergonomic chairs. Natural sunlight streams through large floor-to-ceiling windows, creating a clean, professional atmosphere. The scene is illuminated by soft, natural daylight emphasizing a modern corporate aesthetic with subtle blue and teal accents." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBl07aX8BvTDOzxpt87-qOO3fGBghoSi5C8fec9XVkkOavacfdWLwyHp1L1Ml5UX2UluKZrlXq9cTD3KqJPbIEQAPRExoCaU90fXQLl0VR9OFu4mp2WqtNeQzUT0HzYqzphei434XaJ8V2R5pG21e77Nc8mMHAHH5odaNcmsZu70kOQPHntkR9yPsrOPnMyD-xg44wPKYoZEpwKmUUMo29_rrtQn7jZM0WJB3v0yD5En_9hEvU3a1J7SnnoTt6k6edsMpZSZsqOAUE')"></div>
<div class="absolute inset-0 bg-surface/80 backdrop-blur-md"></div>
<!-- Login Card -->
<div class="relative z-10 w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-elevation-3 border border-outline-variant p-xl flex flex-col gap-lg">
<!-- Header -->
<div class="flex flex-col items-center text-center mb-sm">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-primary font-headline-md" style="font-variation-settings: 'FILL' 1;">corporate_fare</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">CoWork Manager</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your operational dashboard</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wide" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-12 pl-[44px] pr-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" placeholder="admin@cowork.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wide" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-12 pl-[44px] pr-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between mt-xs mb-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface-container-lowest cursor-pointer" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-sm transition-colors duration-200 shadow-sm active:scale-[0.98]" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="mt-md text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Need help? <a class="text-primary font-label-md text-label-md hover:underline" href="#">Contact IT Support</a>
</p>
</div>
</div>
</div>
</body></html>
