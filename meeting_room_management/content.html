<div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6 sm:mb-8">
    <div>
        <h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg font-bold text-on-surface">Workspace Settings</h2>
        <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Manage shared workspaces, seat counts, locations, and amenities.</p>
    </div>
    <div class="flex gap-2 w-full sm:w-auto">
        <button onclick="openWorkspaceModal()" class="flex items-center gap-2 bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md text-label-md hover:bg-primary/90 transition-colors justify-center flex-1 sm:flex-initial shadow-sm">
            <span class="material-symbols-outlined text-[18px]">add</span> Add Workspace
        </button>
    </div>
</div>

<!-- Grid Layout -->
<div id="workspaceGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    <!-- Dynamic workspace cards will be rendered here -->
</div>

<!-- Add/Edit Workspace Modal -->
<div id="workspaceModalOverlay" class="fixed inset-0 bg-surface-variant/85 backdrop-blur-xs z-[100] hidden opacity-0 transition-opacity duration-300" onclick="closeWorkspaceModal()"></div>
<div id="workspaceModal" class="fixed inset-y-0 right-0 w-full sm:w-[500px] bg-surface-container-lowest shadow-level-5 z-[101] transform translate-x-full transition-transform duration-300 hidden flex flex-col h-full rounded-l-2xl border-l border-outline-variant">
    
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-lg border-b border-outline-variant shrink-0 bg-surface-bright">
        <div>
            <h3 id="workspaceModalTitle" class="font-headline-md font-bold text-on-surface">Add Workspace</h3>
            <p class="font-body-sm text-on-surface-variant mt-1">Configure shared workspace details</p>
        </div>
        <button onclick="closeWorkspaceModal()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-low text-on-surface transition-colors" aria-label="Close modal">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <!-- Modal Body -->
    <div class="p-lg overflow-y-auto flex-1 bg-surface-container-lowest">
        <form id="workspaceForm" onsubmit="saveWorkspace(event)" class="flex flex-col gap-xl">
            <input type="hidden" id="workspaceId">
            
            <!-- Basic Details -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Basic Details</h4>
                <div class="grid grid-cols-1 gap-md">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Workspace Name <span class="text-error">*</span></label>
                        <input type="text" id="workspaceName" required class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. eBay 1, Library, Server Room">
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Workspace Type <span class="text-error">*</span></label>
                        <select id="workspaceType" required onchange="handleWorkspaceTypeChange()" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface">
                            <option value="Parent">Parent Workspace (e.g. Nichi-In Workspace 1)</option>
                            <option value="Subspace">Sub-space / Child Zone (e.g. eBay 1, Server Room)</option>
                        </select>
                    </div>

                    <div id="parentCategoryWrapper" class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Client Category <span class="text-error">*</span></label>
                        <select id="workspaceClientType" onchange="handleWorkspaceClientTypeChange()" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface">
                            <option value="Internal">Internal</option>
                            <option value="External">External</option>
                        </select>
                    </div>

                    <div id="buildingIdWrapper" class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Building ID <span class="text-error">*</span></label>
                        <input type="text" id="workspaceBuildingId" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. 812, 813, 814">
                    </div>

                    <div id="subspaceParentWrapper" class="hidden flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Parent Workspace Zone <span class="text-error">*</span></label>
                        <select id="workspaceParentWorkspace" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface">
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Location <span class="text-error">*</span></label>
                        <input type="text" id="workspaceLocation" required class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. Floor 1, East Wing">
                    </div>
                </div>
            </div>

            <!-- Capacity & Size -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Capacity & Size</h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Total Seats <span class="text-error">*</span></label>
                        <input type="number" id="workspaceCapacity" required min="1" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. 10">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Size (sq ft) <span class="text-error">*</span></label>
                        <input type="number" id="workspaceSize" required min="10" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="e.g. 350">
                    </div>
                </div>
            </div>

            <!-- Amenities -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Amenities</h4>
                <div class="flex flex-wrap gap-3">
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="amenities" value="High-Speed WiFi" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">wifi</span>
                        <span class="font-body-sm text-on-surface">High-Speed WiFi</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="amenities" value="Power Outlets" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">power</span>
                        <span class="font-body-sm text-on-surface">Power Outlets</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="amenities" value="TV" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">tv</span>
                        <span class="font-body-sm text-on-surface">Smart TV / Display</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="amenities" value="Whiteboard" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">architecture</span>
                        <span class="font-body-sm text-on-surface">Whiteboard</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-surface-container px-3 py-2 rounded-lg border border-outline-variant hover:border-primary transition-colors">
                        <input type="checkbox" name="amenities" value="Natural Light" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4">
                        <span class="material-symbols-outlined text-[18px]">light_mode</span>
                        <span class="font-body-sm text-on-surface">Natural Light</span>
                    </label>
                </div>
            </div>

            <!-- Status -->
            <div>
                <h4 class="font-label-md font-semibold text-on-surface border-b border-outline-variant pb-xs mb-sm">Status & Visuals</h4>
                <div class="grid grid-cols-1 gap-md">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Status <span class="text-error">*</span></label>
                        <select id="workspaceStatus" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface">
                            <option value="Active">Active</option>
                            <option value="Maintenance">Maintenance</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Image URL (Optional)</label>
                        <input type="url" id="workspaceImage" class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-sm text-on-surface" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
            </div>

            <button type="submit" class="hidden" id="workspaceFormSubmitBtn"></button>
        </form>
    </div>
    
    <!-- Footer Actions -->
    <div class="p-md border-t border-outline-variant bg-surface flex gap-sm mt-auto justify-end rounded-bl-2xl shrink-0">
        <button type="button" class="px-6 py-2 border border-outline-variant rounded-lg font-label-md text-on-surface hover:bg-surface-container-low transition-colors shadow-sm" onclick="closeWorkspaceModal()">Cancel</button>
        <button type="button" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary/90 transition-colors shadow-sm" onclick="triggerFormSubmit()">Save Workspace</button>
    </div>
</div>

<!-- View Workspace Detail Modal -->
<div id="workspaceDetailOverlay" class="fixed inset-0 bg-surface-variant/85 backdrop-blur-xs z-[100] hidden opacity-0 transition-opacity duration-300" onclick="closeWorkspaceDetail()"></div>
<div id="workspaceDetailModal" class="fixed inset-y-0 right-0 w-full sm:w-[500px] bg-surface-container-lowest shadow-level-5 z-[101] transform translate-x-full transition-transform duration-300 hidden flex flex-col h-full rounded-l-2xl border-l border-outline-variant">
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-lg border-b border-outline-variant shrink-0 bg-surface-bright">
        <div>
            <h3 class="font-headline-md font-bold text-on-surface">Workspace Details</h3>
            <p class="font-body-sm text-on-surface-variant mt-1">Full specifications and configuration</p>
        </div>
        <button onclick="closeWorkspaceDetail()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-low text-on-surface transition-colors" aria-label="Close modal">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <!-- Modal Body -->
    <div class="p-lg overflow-y-auto flex-1 bg-surface-container-lowest space-y-6" id="workspaceDetailContent">
        <!-- Will be populated dynamically -->
    </div>

    <!-- Footer Actions -->
    <div class="p-md border-t border-outline-variant bg-surface flex gap-sm mt-auto justify-end rounded-bl-2xl shrink-0">
        <button type="button" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary/90 transition-colors shadow-sm" onclick="closeWorkspaceDetail()">Close</button>
    </div>
</div>

<script>
(function() {
    let workspaces = [];

    async function loadWorkspaces() {
        // Enforce reload if loaded meeting rooms previously or if parent workspaces are missing
        let stored = sessionStorage.getItem("workspaces");
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.some(w => w.name.includes("Boardroom") || w.name.includes("Podcast") || w.name.includes("Hub")) || !parsed.some(w => w.name === "Dept 1 - Bay 1")) {
                sessionStorage.removeItem("workspaces");
                stored = null;
            }
        }

        if (!stored) {
            try {
                const res = await fetch("../member/data/workspaces.json");
                const data = await res.json();
                sessionStorage.setItem("workspaces", JSON.stringify(data));
                stored = JSON.stringify(data);
            } catch (e) {
                console.error("Failed to fetch workspaces seed data", e);
                stored = "[]";
            }
        }
        workspaces = JSON.parse(stored);
        renderWorkspaces();
    }

    function renderWorkspaces() {
        const grid = document.getElementById("workspaceGrid");
        if (!grid) return;

        if (workspaces.length === 0) {
            grid.innerHTML = `<div class="col-span-full py-12 text-center text-on-surface-variant font-body-md">No workspaces registered. Click "Add Workspace" to create one.</div>`;
            return;
        }

        grid.innerHTML = workspaces.map(w => {
            let statusBadge = `<div class="absolute top-4 right-4 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-secondary"></span> Active</div>`;
            if (w.status === "Maintenance") {
                statusBadge = `<div class="absolute top-4 right-4 bg-error-container text-on-error-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-error"></span> Maintenance</div>`;
            } else if (w.status === "Inactive") {
                statusBadge = `<div class="absolute top-4 right-4 bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-outline-variant"></span> Inactive</div>`;
            }

            const imgUrl = w.image || "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80";

            const clientType = w.clientType || "Internal";
            const categoryBadge = `<div class="absolute top-4 left-4 bg-primary text-on-primary px-3 py-1 rounded-lg font-label-sm text-xs shadow-sm font-semibold uppercase tracking-wider z-10">${clientType}</div>`;

            return `
                <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col group relative">
                    <div class="h-48 w-full relative bg-surface-container-low shrink-0">
                        <img src="${imgUrl}" alt="${w.name}" class="w-full h-full object-cover">
                        ${categoryBadge}
                        ${statusBadge}
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between">
                        <div class="mb-4">
                            <h3 class="font-headline-sm text-headline-sm text-on-surface font-bold leading-tight break-words">${w.name.replace(/\s*\((Int|Ext)\)/i, "")}</h3>
                            <p class="font-body-sm text-body-sm text-on-surface-variant mt-2 flex items-start gap-1">
                                <span class="material-symbols-outlined text-[16px] mt-0.5 shrink-0 text-outline-variant">location_on</span>
                                <span class="leading-normal break-words">${w.location}</span>
                            </p>
                        </div>
                        <div class="flex items-center gap-6 mb-6 font-body-sm text-body-sm text-on-surface-variant">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-outline text-[18px]">group</span>
                                <span class="font-semibold">${w.capacity} Seats</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-outline text-[18px]">square_foot</span>
                                <span class="font-semibold">${w.size || 150} sq ft</span>
                            </div>
                        </div>
                        <div class="mt-auto">
                            <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2 font-semibold">Amenities</p>
                            <div class="flex flex-wrap gap-1.5">
                                ${w.amenities && w.amenities.length > 0 
                                    ? w.amenities.map(a => `<span class="bg-surface-variant/40 text-on-surface-variant border border-outline-variant/50 text-[11px] px-2.5 py-1 rounded-lg font-medium">${a}</span>`).join("")
                                    : `<span class="text-xs italic text-on-surface-variant">No amenities listed</span>`
                                }
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-outline-variant/40 bg-surface-bright/50 px-6 py-3 flex justify-end gap-2 shrink-0">
                        <button onclick="viewWorkspaceDetail(${w.id})" class="flex items-center gap-1 text-blue-600 hover:bg-blue-50 transition-colors px-3 py-1.5 rounded-lg font-label-md text-sm mr-auto">
                            <span class="material-symbols-outlined text-[18px]">info</span> Detail
                        </button>
                        <button onclick="openWorkspaceModal(${w.id})" class="flex items-center gap-1 text-primary hover:bg-primary/10 transition-colors px-3 py-1.5 rounded-lg font-label-md text-sm">
                            <span class="material-symbols-outlined text-[18px]">edit</span> Edit
                        </button>
                        <button onclick="deleteWorkspace(${w.id})" class="flex items-center gap-1 text-error hover:bg-error/10 transition-colors px-3 py-1.5 rounded-lg font-label-md text-sm">
                            <span class="material-symbols-outlined text-[18px]">delete</span> Delete
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    function handleWorkspaceTypeChange() {
        const type = document.getElementById("workspaceType").value;
        const parentWrapper = document.getElementById("parentCategoryWrapper");
        const buildingIdWrapper = document.getElementById("buildingIdWrapper");
        const childWrapper = document.getElementById("subspaceParentWrapper");
        
        if (type === "Parent") {
            parentWrapper.classList.remove("hidden");
            buildingIdWrapper.classList.remove("hidden");
            childWrapper.classList.add("hidden");
        } else {
            parentWrapper.classList.add("hidden");
            buildingIdWrapper.classList.add("hidden");
            childWrapper.classList.remove("hidden");
            populateParentSelect();
        }
    }

    function handleWorkspaceClientTypeChange() {
        const ct = document.getElementById("workspaceClientType").value;
        const bIdInput = document.getElementById("workspaceBuildingId");
        if (bIdInput) {
            bIdInput.value = ct === "Internal" ? "812" : "813";
        }
    }

    function populateParentSelect() {
        const select = document.getElementById("workspaceParentWorkspace");
        if (!select) return;
        const parents = workspaces.filter(w => !w.parentWorkspace);
        select.innerHTML = `<option value="">Select Parent Workspace Zone...</option>` +
            parents.map(p => `<option value="${p.name}">${p.name.replace(/\s*\((Int|Ext)\)/i, "")} (${p.clientType || "Internal"})</option>`).join("");
    }

    function openWorkspaceModal(id = null) {
        const modal = document.getElementById('workspaceModal');
        const overlay = document.getElementById('workspaceModalOverlay');
        const title = document.getElementById('workspaceModalTitle');
        const form = document.getElementById('workspaceForm');
        
        document.querySelectorAll('input[name="amenities"]').forEach(cb => cb.checked = false);
        populateParentSelect();

        if (id) {
            const w = workspaces.find(x => x.id === id);
            if (w) {
                title.innerText = 'Edit Workspace';
                document.getElementById('workspaceId').value = w.id;
                document.getElementById('workspaceName').value = w.name.replace(/\s*\((Int|Ext)\)/i, "");
                document.getElementById('workspaceLocation').value = w.location;
                document.getElementById('workspaceCapacity').value = w.capacity;
                document.getElementById('workspaceSize').value = w.size || 150;
                document.getElementById('workspaceStatus').value = w.status || 'Active';
                document.getElementById('workspaceImage').value = w.image || '';

                if (w.parentWorkspace) {
                    document.getElementById("workspaceType").value = "Subspace";
                    document.getElementById("workspaceParentWorkspace").value = w.parentWorkspace;
                } else {
                    document.getElementById("workspaceType").value = "Parent";
                    document.getElementById("workspaceClientType").value = w.clientType || "Internal";
                    document.getElementById("workspaceBuildingId").value = w.buildingId || (w.clientType === "Internal" ? "812" : "813");
                }

                if (w.amenities) {
                    w.amenities.forEach(a => {
                        const cb = document.querySelector(`input[name="amenities"][value="${a}"]`);
                        if (cb) cb.checked = true;
                    });
                }
            }
        } else {
            title.innerText = 'Add Workspace';
            form.reset();
            document.getElementById('workspaceId').value = '';
            document.getElementById("workspaceType").value = "Parent";
            document.getElementById("workspaceClientType").value = "Internal";
            document.getElementById("workspaceBuildingId").value = "812";
        }

        handleWorkspaceTypeChange();
        
        modal.classList.remove('hidden');
        overlay.classList.remove('hidden');
        
        setTimeout(() => {
            modal.classList.remove('translate-x-full');
            overlay.classList.remove('opacity-0');
        }, 10);
        
        document.body.style.overflow = 'hidden';
    }

    function closeWorkspaceModal() {
        const modal = document.getElementById('workspaceModal');
        const overlay = document.getElementById('workspaceModalOverlay');
        
        modal.classList.add('translate-x-full');
        overlay.classList.add('opacity-0');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            overlay.classList.add('hidden');
            document.body.style.overflow = '';
        }, 300);
    }

    function triggerFormSubmit() {
        document.getElementById("workspaceFormSubmitBtn").click();
    }
    
    function saveWorkspace(e) {
        e.preventDefault();
        
        const idVal = document.getElementById('workspaceId').value;
        const rawName = document.getElementById('workspaceName').value.trim();
        const location = document.getElementById('workspaceLocation').value.trim();
        const capacity = parseInt(document.getElementById('workspaceCapacity').value);
        const size = parseInt(document.getElementById('workspaceSize').value);
        const status = document.getElementById('workspaceStatus').value;
        const image = document.getElementById('workspaceImage').value.trim();

        const type = document.getElementById("workspaceType").value;
        let clientType = "Internal";
        let parentWorkspace = "";
        let buildingId = "812";

        if (type === "Parent") {
            clientType = document.getElementById("workspaceClientType").value;
            buildingId = document.getElementById("workspaceBuildingId").value.trim() || (clientType === "Internal" ? "812" : "813");
        } else {
            parentWorkspace = document.getElementById("workspaceParentWorkspace").value;
            if (!parentWorkspace) {
                alert("Please select a parent workspace zone.");
                return;
            }
            const parentObj = workspaces.find(w => w.name === parentWorkspace);
            if (parentObj) {
                clientType = parentObj.clientType;
                buildingId = parentObj.buildingId;
            }
        }

        // Generate final name suffix cleanly to prevent duplicates
        const cleanName = rawName.replace(/\s*\((Int|Ext)\)/i, "");
        const suffix = clientType === "Internal" ? " (Int)" : " (Ext)";
        const name = cleanName + suffix;

        const amenities = Array.from(document.querySelectorAll('input[name="amenities"]:checked')).map(cb => cb.value);

        if (!cleanName || !location || isNaN(capacity) || isNaN(size)) {
            alert("Please fill in all required fields.");
            return;
        }

        if (idVal) {
            const idx = workspaces.findIndex(x => x.id === parseInt(idVal));
            if (idx !== -1) {
                workspaces[idx] = {
                    ...workspaces[idx],
                    name,
                    location,
                    capacity,
                    size,
                    status,
                    image,
                    amenities,
                    clientType,
                    buildingId,
                    parentWorkspace: parentWorkspace || undefined
                };
                alert('Workspace updated successfully!');
            }
        } else {
            const newId = workspaces.length > 0 ? Math.max(...workspaces.map(x => x.id)) + 1 : 1;
            const newWorkspace = {
                id: newId,
                type: "Shared Space",
                name,
                location,
                capacity,
                size,
                status,
                image,
                amenities,
                clientType,
                buildingId,
                parentWorkspace: parentWorkspace || undefined
            };
            workspaces.unshift(newWorkspace);
            alert('Workspace added successfully!');
        }

        sessionStorage.setItem("workspaces", JSON.stringify(workspaces));
        renderWorkspaces();
        closeWorkspaceModal();
    }
    
    function deleteWorkspace(id) {
        if (confirm("Are you sure you want to delete this workspace? This action cannot be undone.")) {
            workspaces = workspaces.filter(x => x.id !== id);
            sessionStorage.setItem("workspaces", JSON.stringify(workspaces));
            renderWorkspaces();
            alert("Workspace deleted successfully.");
        }
    }

    function viewWorkspaceDetail(id) {
        const w = workspaces.find(x => x.id === id);
        if (!w) return;

        const content = document.getElementById("workspaceDetailContent");
        if (!content) return;

        const imgUrl = w.image || "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80";
        const clientType = w.clientType || "Internal";

        content.innerHTML = `
            <div class="w-full h-48 rounded-xl overflow-hidden bg-slate-100 border border-outline-variant relative shrink-0 mb-6">
                <img src="${imgUrl}" alt="${w.name}" class="w-full h-full object-cover">
                <div class="absolute top-4 left-4 bg-primary text-on-primary px-3 py-1 rounded-lg font-label-sm text-xs shadow-sm font-semibold uppercase tracking-wider">${clientType}</div>
                <div class="absolute top-4 right-4 bg-blue-50 text-blue-700 px-3 py-1 rounded-full font-label-sm text-xs font-semibold shadow-sm">${w.status}</div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Workspace Name</h4>
                    <p class="text-lg font-bold text-slate-800 mt-1">${w.name.replace(/\s*\((Int|Ext)\)/i, "")}</p>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Type</h4>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${w.type || "Shared Space"}</p>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Building ID</h4>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${w.buildingId || "N/A"}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Location</h4>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${w.location}</p>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Parent Workspace</h4>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${w.parentWorkspace ? w.parentWorkspace.replace(/\s*\((Int|Ext)\)/i, "") : "None (Root Workspace)"}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Capacity</h4>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${w.capacity} Seats</p>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Size</h4>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${w.size || 150} sq ft</p>
                    </div>
                </div>

                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Amenities</h4>
                    <div class="flex flex-wrap gap-1.5">
                        ${w.amenities && w.amenities.length > 0 
                            ? w.amenities.map(a => `<span class="bg-slate-100 text-slate-700 border border-slate-200 text-xs px-2.5 py-1 rounded-lg font-medium">${a}</span>`).join("")
                            : `<span class="text-xs italic text-slate-400">No amenities listed</span>`
                        }
                    </div>
                </div>
            </div>
        `;

        const modal = document.getElementById('workspaceDetailModal');
        const overlay = document.getElementById('workspaceDetailOverlay');
        if (modal && overlay) {
            modal.classList.remove('hidden');
            overlay.classList.remove('hidden');
            // Force reflow
            void modal.offsetWidth;
            modal.classList.remove('translate-x-full');
            overlay.classList.remove('opacity-0');
            document.body.style.overflow = 'hidden';
        }
    }

    function closeWorkspaceDetail() {
        const modal = document.getElementById('workspaceDetailModal');
        const overlay = document.getElementById('workspaceDetailOverlay');
        if (modal && overlay) {
            modal.classList.add('translate-x-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }
    }

    // Initialize Page
    loadWorkspaces();

    // Expose handlers globally for SPA inline event handlers
    window.openWorkspaceModal = openWorkspaceModal;
    window.closeWorkspaceModal = closeWorkspaceModal;
    window.saveWorkspace = saveWorkspace;
    window.deleteWorkspace = deleteWorkspace;
    window.triggerFormSubmit = triggerFormSubmit;
    window.handleWorkspaceTypeChange = handleWorkspaceTypeChange;
    window.handleWorkspaceClientTypeChange = handleWorkspaceClientTypeChange;
    window.viewWorkspaceDetail = viewWorkspaceDetail;
    window.closeWorkspaceDetail = closeWorkspaceDetail;
})();
</script>
