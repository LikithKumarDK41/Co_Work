<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Invite Visitor -Nichi-In</title>
    <link href="layout.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <style type="text/tailwindcss">

            .page-layout {
                @apply flex-1 md:ml-64 p-margin-mobile md:p-margin-desktop max-w-container-max mx-auto w-full;
            }

            .scale-98 { transform: scale(0.98); }
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#0b1c30",
                        "secondary-fixed-dim": "#4fdbc8",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#6df5e1",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "on-primary-container": "#eeefff",
                        "on-secondary-container": "#006f64",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#71f8e4",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "outline": "#737686",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#07006c",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed": "#e1e0ff",
                        "tertiary-container": "#585be6",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-surface": "#213145",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#f1eeff",
                        "on-primary-fixed": "#00174b",
                        "primary": "#004ac6",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed": "#00201c",
                        "on-surface-variant": "#434655",
                        "secondary": "#006b5f",
                        "tertiary": "#3e3fcc",
                        "on-secondary-fixed-variant": "#005048"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "unit": "4px",
                        "sm": "8px",
                        "sidebar-width": "260px",
                        "container-max": "1440px",
                        "xs": "4px",
                        "md": "16px",
                        "xxl": "48px",

                    "fontFamily": {

    <script src="layout.js" defer></script>

<body class="bg-background text-on-background font-body-md min-h-screen flex">
    <!-- Main Content Canvas -->
    <main class="page-layout flex-1 md:ml-64 p-margin-mobile md:p-margin-desktop min-h-screen relative overflow-hidden">
        <!-- Decorative Background Blob -->
        <div
            class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-secondary-container rounded-full mix-blend-multiply filter blur-[100px] opacity-40 -z-10">
        </div>
        <div
            class="absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] bg-surface-container-high rounded-full mix-blend-multiply filter blur-[120px] opacity-50 -z-10">
        </div>
        <div class="max-w-2xl mx-auto mt-stack-lg">
            <div class="mb-stack-lg flex items-center justify-between">
                <div>
                    <h2 class="text-3xl font-bold text-[#004ac6] tracking-tight mb-2">Invite Visitor</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-2">Generate a temporary access pass
                        for your guest.</p>
                </div>
                <button
                    class="md:hidden flex items-center justify-center w-10 h-10 rounded-full bg-surface-container text-primary">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
            <div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] p-8 md:p-10">
                <form class="space-y-stack-md">
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface mb-2" for="visitor_name">Visitor
                            Full Name</label>
                        <input
                            class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline"
                            id="visitor_name" name="visitor_name" placeholder="e.g. Jane Doe" type="text">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                        <div>
                            <label class="block font-label-md text-label-md text-on-surface mb-2"
                                for="visitor_email">Email Address</label>
                            <input
                                class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline"
                                id="visitor_email" name="visitor_email" placeholder="jane@example.com" type="email">
                        </div>
                        <div>
                            <label class="block font-label-md text-label-md text-on-surface mb-2"
                                for="visitor_phone">Phone Number <span
                                    class="text-on-surface-variant font-normal">(Optional)</span></label>
                            <input
                                class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline"
                                id="visitor_phone" name="visitor_phone" placeholder="+1 (555) 000-0000" type="tel">
                        </div>
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface mb-2" for="visit_date">Date of
                            Visit</label>
                        <div class="relative">
                            <input
                                class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none"
                                id="visit_date" name="visit_date" style="color-scheme: light;" type="date">
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">calendar_today</span>
                        </div>
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface mb-2"
                            for="visit_purpose">Purpose of Visit</label>
                        <select
                            class="w-full bg-surface border border-outline-variant text-on-surface rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none"
                            id="visit_purpose" name="visit_purpose">
                            <option disabled="" selected="" value="">Select a reason...</option>
                            <option value="meeting">Meeting / Collaboration</option>
                            <option value="interview">Interview</option>
                            <option value="vendor">Vendor / Delivery</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="pt-4 mt-8 border-t border-outline-variant/30 flex justify-end">
                        <a href="visitor_checkin.html"
                            class="bg-primary text-on-primary px-8 py-3 rounded-lg font-label-md text-label-md font-semibold hover:bg-inverse-surface transition-colors duration-200 flex items-center gap-2">
                            <span class="">Generate Visitor Pass</span>
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>




</body>

</html>
