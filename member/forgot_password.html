<html class="light" lang="en">

<head>

                            "inverse-surface": "#213145",
                            "primary-fixed": "#dbe1ff",

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .login-card {
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08),
                0 8px 22px rgba(0, 0, 0, 0.06);
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(200, 234, 210, 0.75);
        }
    </style>
</head>

<body class="bg-background min-h-screen min-h-[100dvh] text-on-background font-body-md antialiased overflow-x-hidden">
    <div class="relative min-h-screen min-h-[100dvh] flex items-center justify-center p-4 sm:p-6 lg:p-md">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 bg-cover bg-center"
            style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuBl07aX8BvTDOzxpt87-qOO3fGBghoSi5C8fec9XVkkOavacfdWLwyHp1L1Ml5UX2UluKZrlXq9cTD3KqJPbIEQAPRExoCaU90fXQLl0VR9OFu4mp2WqtNeQzUT0HzYqzphei434XaJ8V2R5pG21e77Nc8mMHAHH5odaNcmsZu70kOQPHntkR9yPsrOPnMyD-xg44wPKYoZEpwKmUUMo29_rrtQn7jZM0WJB3v0yD5En_9hEvU3a1J7SnnoTt6k6edsMpZSZsqOAUE&quot;);">
        </div>
        <div class="absolute inset-0 bg-surface/80 backdrop-blur-md"></div>
        
        <!-- Form Card -->
        <section class="relative z-10 login-card w-full max-w-[390px] bg-white rounded-[22px] border border-outline-variant px-7 py-5">
            <div class="text-center mb-4">
                <div class="mx-auto mb-2 h-14 w-14 rounded-lg bg-[#004ac6] flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-[32px]">domain</span>
                </div>
                <h1 class="font-heading text-[22px] leading-7 font-bold text-primary tracking-tight">CoWork</h1>
                <p class="mt-0.5 text-[11px] font-semibold tracking-wide uppercase text-on-surface-variant">Member Portal</p>
            </div>

            <div class="space-y-3.5">
                <div class="mb-4">
                    <h2 class="text-[20px] leading-6 font-bold text-on-surface">Forgot Password</h2>
                    <p class="mt-1 text-[11px] text-on-surface-variant">Enter your User ID or registered Email to receive reset instructions.</p>
                </div>

                <form id="forgotForm" onsubmit="event.preventDefault(); submitForgot();" class="space-y-3.5">
                    <div>
                        <label for="forgot-email" class="block text-[13px] font-bold text-on-surface mb-1.5">Email or User ID</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[19px]">mail</span>
                            <input id="forgot-email" type="text" placeholder="e.g., user@coworkspace.com" required
                                class="w-full h-10 rounded-xl border border-outline-variant bg-white pl-11 pr-4 text-[13px] text-on-surface placeholder:text-gray-400 transition focus:border-primary" />
                        </div>
                        <p id="forgot-error" class="hidden text-[#ba1a1a] text-[11px] mt-1 font-medium">Please enter your Email or User ID.</p>
                    </div>

                    <button type="submit"
                        class="w-full h-12 rounded-lg bg-[#004ac6] text-white font-semibold text-sm hover:bg-[#003ea8] active:scale-[0.98] transition-colors duration-200 flex items-center justify-center gap-2 shadow-sm">
                        <span>Send Reset Link</span>
                        <span class="material-symbols-outlined text-[20px]">send</span>
                    </button>

                    <div class="text-center mt-2">
                        <a href="login.html" class="text-[11px] font-bold text-primary hover:underline">Back to Login</a>
                    </div>
                </form>
            </div>

            <footer class="mt-4 text-center">
                <div class="flex items-center justify-center gap-2.5 text-[10.5px] text-on-surface-variant flex-wrap">
                    <a href="#help-center" class="hover:text-primary">Help Center</a>
                    <span class="h-1 w-1 rounded-full bg-gray-300"></span>
                    <a href="#privacy-policy" class="hover:text-primary">Privacy Policy</a>
                    <span class="h-1 w-1 rounded-full bg-gray-300"></span>
                    <a href="#terms" class="hover:text-primary">Terms of Use</a>
                </div>
                <p class="mt-2 text-[8.5px] uppercase tracking-widest text-gray-400">© 2026 Nichi-In. All Rights Reserved.</p>
            </footer>
        </section>
    </div>

    <script>
        function submitForgot() {
            const input = document.getElementById('forgot-email');
            const error = document.getElementById('forgot-error');
            if (!input.value.trim()) {
                error.classList.remove('hidden');
                return;
            }
            error.classList.add('hidden');
            alert("A password reset link has been sent to your email!");
            window.location.href = "reset_password.html";
        }
    </script>
</body>
</html>
