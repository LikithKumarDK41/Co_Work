<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Meeting Rooms - SB Telecom</title>
    <link href="layout.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#0b1c30",
                        "secondary-fixed-dim": "#4fdbc8",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#6df5e1",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "on-primary-container": "#eeefff",
                        "on-secondary-container": "#006f64",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#71f8e4",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "outline": "#737686",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#07006c",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed": "#e1e0ff",
                        "tertiary-container": "#585be6",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-surface": "#213145",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#f1eeff",
                        "on-primary-fixed": "#00174b",
                        "primary": "#004ac6",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed": "#00201c",
                        "on-surface-variant": "#434655",
                        "secondary": "#006b5f",
                        "tertiary": "#3e3fcc",
                        "on-secondary-fixed-variant": "#005048"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "unit": "4px",
                        "sm": "8px",
                        "sidebar-width": "260px",
                        "container-max": "1440px",
                        "xs": "4px",
                        "md": "16px",
                        "xxl": "48px",
                        "lg": "24px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            min-height: 100%;
            background-color: #fbf9f9;
        }

        body {
            color: #1b1c1c;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page-bg {
            background-color: #fbf9f9;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c4c7c7;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #747878;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <script src="layout.js" defer></script>
</head>

<body class="min-h-screen flex bg-background page-bg">

    <main
        class="page-layout page-bg p-4 md:p-8 pb-24 md:pb-24 max-w-[1440px] mx-auto w-full flex-1 flex flex-col gap-6">

        <!-- Page Header -->
        <div
            class="flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-surface-container-high pb-6">
            <div>
                <h2 class="text-3xl font-bold text-[#004ac6] tracking-tight mb-2">
                    Meeting Rooms
                </h2>

                <p class="font-body-md text-body-md text-on-surface-variant max-w-2xl">
                    Find and reserve the perfect space for your next collaboration. Filter by capacity, amenities, or
                    immediate availability.
                </p>
            </div>
        </div>

        <!-- Search & Filter Bar -->
        <div
            class="bg-surface rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] p-4 flex flex-col md:flex-row gap-4 items-center justify-between border border-surface-container-highest">

            <div class="relative w-full md:w-1/3">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">
                    search
                </span>

                <input
                    class="w-full bg-surface-container-low border border-surface-variant rounded-lg pl-10 pr-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/70"
                    placeholder="Search room name or location..." type="text">
            </div>

            <div class="flex flex-wrap gap-3 w-full md:w-auto items-center">

                <div class="relative group">
                    <button
                        class="flex items-center gap-2 bg-surface border border-surface-variant rounded-lg px-4 py-2 font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors">
                        <span class="material-symbols-outlined text-sm text-on-surface-variant">group</span>
                        Capacity
                        <span class="material-symbols-outlined text-sm text-on-surface-variant">expand_more</span>
                    </button>
                </div>

                <div class="relative group">
                    <button
                        class="flex items-center gap-2 bg-surface border border-surface-variant rounded-lg px-4 py-2 font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors">
                        <span class="material-symbols-outlined text-sm text-on-surface-variant">tv</span>
                        Amenities
                        <span class="material-symbols-outlined text-sm text-on-surface-variant">expand_more</span>
                    </button>
                </div>

                <div class="flex items-center bg-surface-container-low rounded-lg p-1 border border-surface-variant">
                    <button
                        class="px-4 py-1.5 rounded-md font-label-md text-label-md bg-surface text-primary shadow-sm">
                        All
                    </button>

                    <button
                        class="px-4 py-1.5 rounded-md font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors">
                        Available Now
                    </button>
                </div>

            </div>
        </div>

        <!-- Room Grid -->
        <div id="rooms_grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Will be populated dynamically -->
        </div>

        <script>
            let workspaces = [];

            async function loadWorkspaces() {
                let stored = sessionStorage.getItem("workspaces");
                if (!stored) {
                    try {
                        const res = await fetch("data/workspaces.json");
                        const data = await res.json();
                        sessionStorage.setItem("workspaces", JSON.stringify(data));
                        stored = JSON.stringify(data);
                    } catch (e) {
                        console.error("Failed to load workspaces list", e);
                        return;
                    }
                }
                workspaces = JSON.parse(stored);
                renderWorkspaces();
            }

            function renderWorkspaces() {
                const grid = document.getElementById("rooms_grid");
                if (!grid) return;

                if (workspaces.length === 0) {
                    grid.innerHTML = `<p class="col-span-3 py-8 text-center text-sm text-slate-500">No meeting rooms found</p>`;
                    return;
                }

                grid.innerHTML = workspaces.map(w => {
                    let statusBadgeClass = "bg-secondary-container text-on-secondary-container";
                    let dotClass = "bg-secondary";
                    if (w.status !== "Available") {
                        statusBadgeClass = "bg-surface-variant text-on-surface-variant";
                        dotClass = "bg-outline";
                    }

                    const amenitiesHTML = w.amenities.map(a => {
                        let icon = "tv";
                        if (a.toLowerCase().includes("wifi")) icon = "wifi";
                        else if (a.toLowerCase().includes("whiteboard")) icon = "edit";
                        else if (a.toLowerCase().includes("soundproof")) icon = "volume_off";
                        else if (a.toLowerCase().includes("phone")) icon = "call";

                        return `
                            <span class="bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm px-2.5 py-1 rounded-md border border-surface-container-highest flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px]">${icon}</span>
                                ${a}
                            </span>
                        `;
                    }).join("");

                    const buttonHTML = w.status === "Available" ? `
                        <button class="w-full bg-primary text-on-primary font-label-md text-label-md py-2.5 rounded-lg hover:opacity-90 transition-opacity">
                            Book
                        </button>
                    ` : `
                        <button class="w-full bg-surface text-primary border border-surface-variant font-label-md text-label-md py-2.5 rounded-lg hover:bg-surface-container-low transition-colors">
                            View Schedule
                        </button>
                    `;

                    return `
                        <div class="bg-surface rounded-xl overflow-hidden shadow-[0px_4px_20px_rgba(0,0,0,0.04)] group hover:shadow-[0px_8px_30px_rgba(0,0,0,0.08)] transition-all duration-300 flex flex-col">
                            <div class="h-48 w-full relative overflow-hidden bg-surface-container-highest">
                                <img alt="${w.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${w.image}">
                                <div class="absolute top-3 right-3 ${statusBadgeClass} font-label-sm text-label-sm px-2 py-1 rounded-md flex items-center gap-1 shadow-sm">
                                    <span class="w-2 h-2 rounded-full ${dotClass}"></span>
                                    ${w.status}
                                </div>
                            </div>
                            <div class="p-5 flex-1 flex flex-col">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="font-headline-md text-headline-md text-primary" style="font-size: 20px; line-height: 28px;">
                                        ${w.name}
                                    </h3>
                                    <span class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
                                        <span class="material-symbols-outlined text-sm">group</span>
                                        ${w.capacity}
                                    </span>
                                </div>
                                <p class="font-body-md text-body-md text-on-surface-variant mb-4 text-sm">
                                    ${w.location}
                                </p>
                                <div class="flex flex-wrap gap-2 mb-6">
                                    ${amenitiesHTML}
                                </div>
                                <div class="mt-auto pt-4 border-t border-surface-container-low flex flex-col gap-3">
                                    <div class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider flex justify-between items-center w-full">
                                        <span>Next available:</span>
                                        <strong class="text-primary text-right">${w.nextAvailable}</strong>
                                    </div>
                                    ${buttonHTML}
                                </div>
                            </div>
                        </div>
                    `;
                }).join("");
            }

            // Initial load
            loadWorkspaces();
        </script>
    </main>
</body>
</html>
