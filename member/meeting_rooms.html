<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Meeting Rooms -Nichi-In</title>
    <link href="layout.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

        tailwind.config = {

            theme: {

                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#6df5e1",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "on-primary-container": "#eeefff",
                        "on-secondary-container": "#006f64",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#71f8e4",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "outline": "#737686",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#07006c",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed": "#e1e0ff",
                        "tertiary-container": "#585be6",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-surface": "#213145",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#f1eeff",
                        "on-primary-fixed": "#00174b",
                        "primary": "#004ac6",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed": "#00201c",
                        "on-surface-variant": "#434655",
                        "secondary": "#006b5f",
                        "tertiary": "#3e3fcc",
                        "on-secondary-fixed-variant": "#005048"
                    },
                    "borderRadius": {

                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            min-height: 100%;
            background-color: #fbf9f9;
        }

        body {
            color: #1b1c1c;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page-bg {
            background-color: #fbf9f9;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c4c7c7;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #747878;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <script src="layout.js" defer></script>
</head>

<body class="min-h-screen flex bg-background page-bg">

    <main
        class="page-layout page-bg p-4 md:p-8 pb-24 md:pb-24 max-w-[1440px] mx-auto w-full flex-1 flex flex-col gap-6">

        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-surface-container-high pb-6">
            <div>
                <h2 class="text-3xl font-bold text-primary tracking-tight mb-2">
                    Workspaces
                </h2>
                <p class="font-body-md text-body-md text-on-surface-variant max-w-2xl">
                    Find and reserve the perfect workspace for your next collaboration. Filter by capacity, size, or amenities.
                </p>
            </div>
        </div>

        <!-- Search & Filter Bar -->
        <div class="bg-surface rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] p-4 flex flex-col md:flex-row gap-4 items-center justify-between border border-surface-container-highest">
            <div class="relative w-full md:w-1/3">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">
                    search
                </span>
                <input id="roomSearchInput" oninput="handleSearch()"
                    class="w-full bg-surface-container-low border border-surface-variant rounded-lg pl-10 pr-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/70"
                    placeholder="Search workspace name or location..." type="text">
            </div>
        </div>

        <!-- Room Grid -->
        <div id="rooms_grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Will be populated dynamically -->
        </div>

        <script>
            (function() {
                let workspaces = [];

                async function loadWorkspaces() {
                    let stored = sessionStorage.getItem("workspaces");
                    if (!stored) {
                        try {
                            const res = await fetch("data/workspaces.json");
                            const data = await res.json();
                            sessionStorage.setItem("workspaces", JSON.stringify(data));
                            stored = JSON.stringify(data);
                        } catch (e) {
                            console.error("Failed to load workspaces list", e);
                            return;
                        }
                    }
                    workspaces = JSON.parse(stored);
                    renderWorkspaces(workspaces);
                }

                function renderWorkspaces(list) {
                    const grid = document.getElementById("rooms_grid");
                    if (!grid) return;

                    if (list.length === 0) {
                        grid.innerHTML = `<p class="col-span-3 py-8 text-center text-sm text-slate-500">No workspaces found</p>`;
                        return;
                    }

                    grid.innerHTML = list.map(w => {
                        let statusBadge = `<div class="absolute top-4 right-4 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-secondary"></span> Active</div>`;
                        if (w.status === "Maintenance") {
                            statusBadge = `<div class="absolute top-4 right-4 bg-error-container text-on-error-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-error"></span> Maintenance</div>`;
                        } else if (w.status === "Inactive") {
                            statusBadge = `<div class="absolute top-4 right-4 bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-outline-variant"></span> Inactive</div>`;
                        }

                        const imgUrl = w.image || "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80";
                        const clientType = w.clientType || "Internal";
                        const categoryBadge = `<div class="absolute top-4 left-4 bg-primary text-on-primary px-3 py-1 rounded-lg font-label-sm text-xs shadow-sm font-semibold uppercase tracking-wider z-10">${clientType}</div>`;

                        const bookButton = w.status === "Active" ? `
                            <a href="book_rooms.html?id=${w.id}" class="w-full bg-primary text-on-primary font-label-md text-label-md py-2.5 rounded-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2 shadow-sm font-semibold no-underline">
                                <span class="material-symbols-outlined text-[18px]">event_available</span> Book Now
                            </a>
                        ` : `
                            <button disabled class="w-full bg-surface-variant text-on-surface-variant border border-outline-variant font-label-md text-label-md py-2.5 rounded-lg cursor-not-allowed opacity-60 flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">block</span> Unavailable
                            </button>
                        `;

                        return `
                            <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col group relative">
                                <div class="h-48 w-full relative bg-surface-container-low shrink-0">
                                    <img src="${imgUrl}" alt="${w.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                    ${categoryBadge}
                                    ${statusBadge}
                                </div>
                                <div class="p-6 flex-1 flex flex-col justify-between">
                                    <div class="mb-4">
                                        <h3 class="font-headline-sm text-headline-sm text-on-surface font-bold leading-tight break-words">${w.name.replace(/\s*\((Int|Ext)\)/i, "")}</h3>
                                        <p class="font-body-sm text-body-sm text-on-surface-variant mt-2 flex items-start gap-1">
                                            <span class="material-symbols-outlined text-[16px] mt-0.5 shrink-0 text-outline-variant">location_on</span>
                                            <span class="leading-normal break-words">${w.location}</span>
                                        </p>
                                    </div>
                                    <div class="flex items-center gap-6 mb-6 font-body-sm text-body-sm text-on-surface-variant">
                                        <div class="flex items-center gap-2">
                                            <span class="material-symbols-outlined text-outline text-[18px]">group</span>
                                            <span class="font-semibold">${w.capacity} Seats</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="material-symbols-outlined text-outline text-[18px]">square_foot</span>
                                            <span class="font-semibold">${w.size || 150} sq ft</span>
                                        </div>
                                    </div>
                                    <div class="mt-auto">
                                        <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2 font-semibold">Amenities</p>
                                        <div class="flex flex-wrap gap-1.5">
                                            ${w.amenities && w.amenities.length > 0 
                                                ? w.amenities.map(a => `<span class="bg-surface-variant/40 text-on-surface-variant border border-outline-variant/50 text-[11px] px-2.5 py-1 rounded-lg font-medium">${a}</span>`).join("")
                                                : `<span class="text-xs italic text-on-surface-variant">No amenities listed</span>`
                                            }
                                        </div>
                                    </div>
                                </div>
                                <div class="border-t border-outline-variant/40 bg-surface-bright/50 px-6 py-3 shrink-0">
                                    ${bookButton}
                                </div>
                            </div>
                        `;
                    }).join("");
                }

                function handleSearch() {
                    const query = document.getElementById("roomSearchInput").value.toLowerCase().trim();
                    const filtered = workspaces.filter(w => 
                        w.name.toLowerCase().includes(query) || 
                        w.location.toLowerCase().includes(query)
                    );
                    renderWorkspaces(filtered);
                }

                loadWorkspaces();
                window.handleSearch = handleSearch;
            })();
        </script>
    </main>
</body>

</html>
