<head>

        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">

                        "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "on-primary-container": "#eeefff",
                        "on-secondary-container": "#006f64",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#71f8e4",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "outline": "#737686",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#07006c",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed": "#e1e0ff",
                        "tertiary-container": "#585be6",

                        "inverse-surface": "#213145",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#f1eeff",
                        "on-primary-fixed": "#00174b",
                        "primary": "#004ac6",
                        "surface-container-highest": "#d3e4fe",

                        "on-secondary-fixed": "#00201c",
                        "on-surface-variant": "#434655",
                        "secondary": "#006b5f",

<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex">
    <!-- Main Content Area -->
    <main class="page-layout flex-1 md:ml-64 bg-background min-h-screen">
        <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-section-gap">
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-stack-lg gap-4">
                <div>
                    <h2 class="text-3xl font-bold text-[#004ac6] tracking-tight mb-2">Ticket History</h2>
                    <p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Manage and track the status of
                        your support requests.</p>
                </div>
                <div class="flex gap-4">
                    <button
                        class="bg-surface border border-outline-variant text-primary px-6 py-2 rounded-lg font-label-md text-label-md hover:bg-surface-container-low transition-colors duration-200">Filter</button>
                    <a href="raise_support.html"
                        class="bg-primary text-on-primary px-6 py-2 rounded-lg font-label-md text-label-md hover:bg-inverse-surface transition-colors duration-200 shadow-sm flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">add</span> New Ticket

                    </a>
                </div>
            </div>
            <!-- List View / Cards Container -->
            <div
                class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] overflow-hidden border border-surface-container-highest">
                <!-- Table Header (Desktop only) -->
                <div
                    class="hidden md:grid grid-cols-12 gap-4 px-6 py-4 border-b border-surface-container-highest bg-surface-container-low font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">
                    <div class="col-span-2">Ticket ID</div>
                    <div class="col-span-4">Subject</div>
                    <div class="col-span-2">Date Created</div>
                    <div class="col-span-2">Last Update</div>
                    <div class="col-span-2 text-right">Status</div>
                </div>
                <!-- Ticket Items -->
                <div id="tickets_list" class="divide-y divide-surface-container-highest">
                    <!-- Will be populated dynamically -->
                </div>
                <!-- Pagination / Footer -->
                <div
                    class="px-6 py-4 border-t border-surface-container-highest bg-surface-container-low flex items-center justify-between">
                    <span id="showing_tickets_text"
                        class="font-body-md text-body-md text-sm text-on-surface-variant">Showing 1 to 4 of 24
                        tickets</span>
                    <div class="flex gap-2">
                        <button
                            class="w-8 h-8 flex items-center justify-center rounded border border-outline-variant text-on-surface-variant hover:bg-surface disabled:opacity-50"
                            disabled="">
                            <span class="material-symbols-outlined text-[18px]">chevron_left</span>
                        </button>
                        <button
                            class="w-8 h-8 flex items-center justify-center rounded border border-outline-variant text-on-surface-variant hover:bg-surface">
                            <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let tickets = [];

        async function loadTickets() {
            let stored = sessionStorage.getItem("tickets");
            if (!stored) {
                try {
                    const res = await fetch("data/tickets.json");
                    const data = await res.json();
                    sessionStorage.setItem("tickets", JSON.stringify(data));
                    stored = JSON.stringify(data);
                } catch (e) {
                    console.error("Failed to load tickets list", e);
                    return;
                }
            }
            tickets = JSON.parse(stored);
            renderTickets();
        }

        function renderTickets() {
            const container = document.getElementById("tickets_list");
            if (!container) return;

            if (tickets.length === 0) {
                container.innerHTML = `<p class="py-8 text-center text-sm text-on-surface-variant">No support tickets found</p>`;
                document.getElementById("showing_tickets_text").textContent = "Showing 0 of 0 tickets";
                return;
            }

            container.innerHTML = tickets.map(t => {
                let statusBadgeClass = "bg-surface-variant text-on-surface";
                let dotClass = "bg-outline";

                if (t.status === "Open") {
                    statusBadgeClass = "bg-error-container text-on-error-container";
                    dotClass = "bg-error";
                } else if (t.status === "Resolved") {
                    statusBadgeClass = "bg-secondary-container text-on-secondary-container";
                    dotClass = "bg-secondary";
                }

                // For resolved tickets, make it slightly opaque to denote complete state
                const opacityClass = t.status === "Resolved" ? "opacity-75" : "";

                return `
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4 px-6 py-5 items-center hover:bg-surface-container-low transition-colors duration-200 cursor-pointer group ${opacityClass}">
                    <div class="col-span-12 md:col-span-2 font-label-md text-label-md text-primary group-hover:text-secondary transition-colors">
                        <span class="md:hidden text-on-surface-variant mr-2">ID:</span>#${t.id}
                    </div>
                    <div class="col-span-12 md:col-span-4 font-body-md text-body-md text-on-surface line-clamp-1">
                        ${t.subject}
                    </div>
                    <div class="col-span-6 md:col-span-2 font-body-md text-body-md text-on-surface-variant text-sm">
                        <span class="md:hidden text-on-surface-variant text-xs block mb-1">Created</span>
                        ${t.dateCreated}
                    </div>
                    <div class="col-span-6 md:col-span-2 font-body-md text-body-md text-on-surface-variant text-sm">
                        <span class="md:hidden text-on-surface-variant text-xs block mb-1">Updated</span>
                        ${t.lastUpdate}
                    </div>
                    <div class="col-span-12 md:col-span-2 md:text-right mt-2 md:mt-0">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full font-label-sm text-label-sm ${statusBadgeClass}">
                            <span class="w-1.5 h-1.5 rounded-full ${dotClass} mr-2"></span>
                            ${t.status}
                        </span>
                    </div>
                </div>
            `;
            }).join("");

            document.getElementById("showing_tickets_text").textContent = `Showing 1 to ${tickets.length} of ${tickets.length} tickets`;
        }

        // Initial load
        loadTickets();
    </script>
</body>

</html>
