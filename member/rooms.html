<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Rooms - Nichi-In</title>
    <link href="layout.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#0b1c30",
                        "secondary-fixed-dim": "#4fdbc8",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#6df5e1",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "on-primary-container": "#eeefff",
                        "on-secondary-container": "#006f64",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#71f8e4",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "outline": "#737686",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#07006c",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed": "#e1e0ff",
                        "tertiary-container": "#585be6",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-surface": "#213145",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#f1eeff",
                        "on-primary-fixed": "#00174b",
                        "primary": "#004ac6",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed": "#00201c",
                        "on-surface-variant": "#434655",
                        "secondary": "#006b5f",
                        "tertiary": "#3e3fcc",
                        "on-secondary-fixed-variant": "#005048"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "unit": "4px",
                        "sm": "8px",
                        "sidebar-width": "260px",
                        "container-max": "1440px",
                        "xs": "4px",
                        "md": "16px",
                        "xxl": "48px",
                        "lg": "24px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            min-height: 100%;
            background-color: #fbf9f9;
        }

        body {
            color: #1b1c1c;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page-bg {
            background-color: #fbf9f9;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c4c7c7;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #747878;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <script src="layout.js" defer></script>
</head>

<body class="min-h-screen flex bg-background page-bg">
    <!-- Main Content Canvas -->
    <main
        class="page-layout page-bg p-4 md:p-8 pb-24 md:pb-24 max-w-[1440px] mx-auto w-full flex-1 flex flex-col gap-6">

        <!-- Top Title and Search Row -->
        <div
            class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-surface-container-high pb-6">
            <div>
                <h2 class="text-3xl font-bold text-primary tracking-tight mb-2">Rooms</h2>
                <p class="font-body-md text-body-md text-on-surface-variant max-w-2xl">Book meeting rooms, creative
                    hubs, and podcast studios equipped with premium specs.</p>
            </div>
            <!-- Search bar -->
            <div class="relative w-full md:w-80 shrink-0">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">
                    search
                </span>
                <input type="text" id="roomSearchInput" oninput="handleSearch()" placeholder="Search rooms..."
                    class="w-full bg-surface-container-low border border-surface-variant rounded-lg pl-10 pr-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/70">
            </div>
        </div>

        <!-- Grid Layout -->
        <div id="rooms_grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- Dynamic room cards will be rendered here -->
        </div>

        <!-- New Room Booking Drawer Modal (Aligned with manager bookings list layout) -->
        <div id="roomBookingModalOverlay"
            class="fixed inset-0 bg-surface-variant/85 backdrop-blur-xs z-[100] hidden opacity-0 transition-opacity duration-300"
            onclick="closeRoomBookingModal()"></div>
        <div id="roomBookingModal"
            class="fixed inset-y-0 right-0 w-full sm:w-[500px] bg-surface-container-lowest shadow-level-5 z-[101] transform translate-x-full transition-transform duration-300 hidden flex flex-col h-full rounded-l-2xl border-l border-outline-variant">

            <!-- Modal Header -->
            <div
                class="flex items-center justify-between p-6 border-b border-outline-variant shrink-0 bg-surface-bright rounded-tl-2xl">
                <div>
                    <h3 class="font-headline-md font-bold text-on-surface text-xl">Book Room</h3>
                    <p class="font-body-sm text-on-surface-variant mt-1">Reserve a room slot or long-term cycle</p>
                </div>
                <button onclick="closeRoomBookingModal()"
                    class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-low text-on-surface transition-colors cursor-pointer border-0 bg-transparent flex items-center justify-center"
                    aria-label="Close modal">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 overflow-y-auto flex-1 bg-surface-container-lowest">
                <form id="roomBookingForm" onsubmit="submitRoomBooking(event)" class="flex flex-col gap-4">
                    <!-- Room Info Panel -->
                    <div
                        class="p-4 border-b border-outline-variant bg-surface-bright flex justify-between items-center shrink-0">
                        <span class="material-symbols-outlined text-primary text-[32px]">meeting_room</span>
                        <div>
                            <div class="font-label-md text-label-md font-bold text-on-surface"
                                id="book_room_display_name">The Boardroom</div>
                            <div class="text-xs text-on-surface-variant mt-0.5" id="book_room_display_location">Building
                                813 • Level 2</div>
                        </div>
                    </div>

                    <!-- Client Category (Disabled to External) -->
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Client Category <span
                                class="text-error">*</span></label>
                        <select id="book_client_category" disabled
                            class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm opacity-75 cursor-not-allowed">
                            <option value="External" selected>External (Building 813)</option>
                        </select>
                    </div>

                    <!-- Booking Purpose/Title -->
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Meeting Title / Purpose <span
                                class="text-error">*</span></label>
                        <input type="text" id="book_title" required
                            class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface"
                            placeholder="e.g. Weekly Strategy Sync">
                    </div>

                    <!-- Booking Term / Cycle -->
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Booking Term / Cycle <span
                                class="text-error">*</span></label>
                        <select id="book_term" required onchange="handleTermChange()"
                            class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                            <option value="Hourly" selected>Hourly</option>
                            <option value="Daily">Daily</option>
                            <option value="Weekly">Weekly</option>
                            <option value="Monthly">Monthly</option>
                            <option value="Yearly">Yearly</option>
                        </select>
                    </div>

                    <!-- Hourly Inputs -->
                    <div id="hourlyInputs" class="flex flex-col gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-on-surface-variant font-semibold">Date <span
                                    class="text-error">*</span></label>
                            <input id="book_date" type="date"
                                class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                        </div>
                        <div class="flex gap-2">
                            <div class="flex-1 flex flex-col gap-1">
                                <label class="font-label-sm text-on-surface-variant font-semibold">Start Time <span
                                        class="text-error">*</span></label>
                                <input id="book_start" type="time"
                                    class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                            </div>
                            <div class="flex-1 flex flex-col gap-1">
                                <label class="font-label-sm text-on-surface-variant font-semibold">End Time <span
                                        class="text-error">*</span></label>
                                <input id="book_end" type="time"
                                    class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                            </div>
                        </div>
                    </div>

                    <!-- Range Inputs (Hidden by default) -->
                    <div id="rangeInputs" class="hidden flex gap-2">
                        <div class="flex-1 flex flex-col gap-1">
                            <label class="font-label-sm text-on-surface-variant font-semibold">Start Date <span
                                    class="text-error">*</span></label>
                            <input id="book_start_date" type="date"
                                class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                        </div>
                        <div class="flex-1 flex flex-col gap-1">
                            <label class="font-label-sm text-on-surface-variant font-semibold">End Date <span
                                    class="text-error">*</span></label>
                            <input id="book_end_date" type="date"
                                class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                        </div>
                    </div>

                    <!-- Recurring Pattern -->
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-on-surface-variant font-semibold">Recurring Option</label>
                        <select id="book_recurring"
                            class="w-full px-3 py-2 rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none text-body-sm text-on-surface">
                            <option value="None" selected>None</option>
                            <option value="Daily">Daily Recurring</option>
                            <option value="Weekly">Weekly Recurring</option>
                            <option value="Monthly">Monthly Recurring</option>
                        </select>
                    </div>

                    <button type="submit" class="hidden" id="roomBookingSubmitBtn"></button>
                </form>
            </div>

            <!-- Footer Actions -->
            <div
                class="p-4 border-t border-outline-variant bg-surface flex gap-3 mt-auto justify-end rounded-bl-2xl shrink-0">
                <button type="button"
                    class="px-6 py-2.5 border border-outline-variant rounded-lg font-label-md text-on-surface hover:bg-surface-container-low transition-colors cursor-pointer border-0 bg-transparent"
                    onclick="closeRoomBookingModal()">Cancel</button>
                <button type="button"
                    class="px-6 py-2.5 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary/90 transition-colors shadow-sm cursor-pointer border-0"
                    onclick="triggerRoomBookingSubmit()">Book Room</button>
            </div>
        </div>

        <script>
                (function () {
                    let rooms = [];
                    let selectedRoomId = null;

                    async function loadRooms() {
                        let stored = sessionStorage.getItem("rooms_list");
                        if (!stored) {
                            try {
                                const res = await fetch("data/rooms.json");
                                const data = await res.json();
                                sessionStorage.setItem("rooms_list", JSON.stringify(data));
                                stored = JSON.stringify(data);
                            } catch (e) {
                                console.error("Failed to load rooms list", e);
                                return;
                            }
                        }
                        const allList = JSON.parse(stored);
                        // Filter to only show External client rooms
                        rooms = allList.filter(r => r.name.toLowerCase().includes("(ext)"));
                        renderRooms(rooms);
                    }

                    function renderRooms(list) {
                        const grid = document.getElementById("rooms_grid");
                        if (!grid) return;

                        if (list.length === 0) {
                            grid.innerHTML = `<div class="col-span-full py-12 text-center text-on-surface-variant font-body-md">No rooms found.</div>`;
                            return;
                        }

                        grid.innerHTML = list.map(r => {
                            let statusBadge = `<div class="absolute top-4 right-4 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-secondary"></span> Active</div>`;
                            if (r.status === "Maintenance") {
                                statusBadge = `<div class="absolute top-4 right-4 bg-error-container text-on-error-container px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-error"></span> Maintenance</div>`;
                            } else if (r.status === "Inactive") {
                                statusBadge = `<div class="absolute top-4 right-4 bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm"><span class="w-2 h-2 rounded-full bg-outline-variant"></span> Inactive</div>`;
                            }

                            const imgUrl = r.image || "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80";

                            let bookButton = r.status === "Active" ? `
                            <button onclick="openRoomBookingModal(${r.id})" class="w-full bg-primary text-on-primary font-label-md text-label-md py-2.5 rounded-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2 shadow-sm font-semibold cursor-pointer border-0">
                                <span class="material-symbols-outlined text-[18px]">event_available</span> Book Now
                            </button>
                        ` : `
                            <button disabled class="w-full bg-surface-variant text-on-surface-variant border border-outline-variant font-label-md text-label-md py-2.5 rounded-lg cursor-not-allowed opacity-60 flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">block</span> Unavailable
                            </button>
                        `;

                            return `
                            <div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col group relative">
                                <div class="h-48 w-full relative bg-surface-container-low shrink-0">
                                    <img src="${imgUrl}" alt="${r.name}" class="w-full h-full object-cover">
                                    ${statusBadge}
                                </div>
                                <div class="p-6 flex-1 flex flex-col justify-between">
                                    <div class="mb-4">
                                        <h3 class="font-headline-sm text-headline-sm text-on-surface font-bold leading-tight break-words">${r.name.replace(/\s*\((Int|Ext)\)/i, "")}</h3>
                                        <p class="font-body-sm text-body-sm text-on-surface-variant mt-2 flex items-start gap-1">
                                            <span class="material-symbols-outlined text-[16px] mt-0.5 shrink-0 text-outline-variant">location_on</span>
                                            <span class="leading-normal break-words">${r.location}</span>
                                        </p>
                                    </div>
                                    <div class="flex items-center gap-6 mb-6 font-body-sm text-body-sm text-on-surface-variant">
                                        <div class="flex items-center gap-2">
                                            <span class="material-symbols-outlined text-outline text-[18px]">group</span>
                                            <span class="font-semibold">${r.capacity} Capacity</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="material-symbols-outlined text-outline text-[18px]">square_foot</span>
                                            <span class="font-semibold">${r.size || 150} sq ft</span>
                                        </div>
                                    </div>
                                    <div class="mb-6">
                                        <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2 font-semibold">Amenities</p>
                                        <div class="flex flex-wrap gap-1.5">
                                            ${r.amenities && r.amenities.length > 0
                                    ? r.amenities.map(a => `<span class="bg-surface-variant/40 text-on-surface-variant border border-outline-variant/50 text-[11px] px-2.5 py-1 rounded-lg font-medium">${a}</span>`).join("")
                                    : `<span class="text-xs italic text-on-surface-variant">No amenities listed</span>`
                                }
                                        </div>
                                    </div>
                                    <div class="mt-auto pt-4 border-t border-outline-variant/30">
                                        ${bookButton}
                                    </div>
                                </div>
                            </div>
                        `;
                        }).join("");
                    }

                    function handleSearch() {
                        const query = document.getElementById("roomSearchInput").value.toLowerCase().trim();
                        const filtered = rooms.filter(r =>
                            r.name.toLowerCase().replace(/\s*\((int|ext)\)/g, "").includes(query) ||
                            r.location.toLowerCase().includes(query)
                        );
                        renderRooms(filtered);
                    }

                    function handleTermChange() {
                        const term = document.getElementById("book_term").value;
                        const hourlyDiv = document.getElementById("hourlyInputs");
                        const rangeDiv = document.getElementById("rangeInputs");

                        if (term === "Hourly") {
                            hourlyDiv.classList.remove("hidden");
                            rangeDiv.classList.add("hidden");
                            document.getElementById("book_date").required = true;
                            document.getElementById("book_start").required = true;
                            document.getElementById("book_end").required = true;
                            document.getElementById("book_start_date").required = false;
                            document.getElementById("book_end_date").required = false;
                        } else {
                            hourlyDiv.classList.add("hidden");
                            rangeDiv.classList.remove("hidden");
                            document.getElementById("book_date").required = false;
                            document.getElementById("book_start").required = false;
                            document.getElementById("book_end").required = false;
                            document.getElementById("book_start_date").required = true;
                            document.getElementById("book_end_date").required = true;
                        }
                    }

                    function openRoomBookingModal(id) {
                        selectedRoomId = id;
                        const r = rooms.find(x => x.id === id);
                        if (!r) return;

                        document.getElementById("book_room_display_name").innerText = r.name.replace(/\s*\((Int|Ext)\)/i, "");
                        document.getElementById("book_room_display_location").innerText = r.location;

                        // Reset values
                        document.getElementById("book_title").value = "";
                        document.getElementById("book_term").value = "Hourly";
                        document.getElementById("book_recurring").value = "None";

                        const todayStr = new Date().toISOString().split('T')[0];
                        document.getElementById("book_date").value = todayStr;
                        document.getElementById("book_date").min = todayStr;
                        document.getElementById("book_start_date").value = todayStr;
                        document.getElementById("book_start_date").min = todayStr;
                        document.getElementById("book_end_date").value = todayStr;
                        document.getElementById("book_end_date").min = todayStr;

                        document.getElementById("book_start").value = "10:00";
                        document.getElementById("book_end").value = "11:00";

                        handleTermChange();

                        const modal = document.getElementById('roomBookingModal');
                        const overlay = document.getElementById('roomBookingModalOverlay');

                        modal.classList.remove('hidden');
                        overlay.classList.remove('hidden');

                        setTimeout(() => {
                            modal.classList.remove('translate-x-full');
                            overlay.classList.remove('opacity-0');
                        }, 10);

                        document.body.style.overflow = 'hidden';
                    }

                    function closeRoomBookingModal() {
                        const modal = document.getElementById('roomBookingModal');
                        const overlay = document.getElementById('roomBookingModalOverlay');

                        modal.classList.add('translate-x-full');
                        overlay.classList.add('opacity-0');

                        setTimeout(() => {
                            modal.classList.add('hidden');
                            overlay.classList.add('hidden');
                            document.body.style.overflow = '';
                        }, 300);
                    }

                    function triggerRoomBookingSubmit() {
                        document.getElementById("roomBookingSubmitBtn").click();
                    }

                    function parseTimeToMinutes(timeStr) {
                        const [hh, mm] = timeStr.split(":").map(Number);
                        return hh * 60 + mm;
                    }

                    function parsePeriod(b) {
                        if (b.term === "Hourly") {
                            const d = new Date(b.date + "T00:00:00");
                            return { start: d, end: new Date(b.date + "T23:59:59") };
                        }
                        const parts = b.date.split(" - ");
                        if (parts.length === 2) {
                            return {
                                start: new Date(parts[0] + "T00:00:00"),
                                end: new Date(parts[1] + "T23:59:59")
                            };
                        }
                        const single = new Date(b.date + "T00:00:00");
                        return { start: single, end: new Date(b.date + "T23:59:59") };
                    }

                    function parseTimeSlotToMinutes(str) {
                        let [time, modifier] = str.split(" ");
                        let [hours, minutes] = time.split(":").map(Number);
                        if (modifier === "PM" && hours < 12) hours += 12;
                        if (modifier === "AM" && hours === 12) hours = 0;
                        return hours * 60 + minutes;
                    }

                    function isTimeOverlapping(start1, end1, start2, end2) {
                        return Math.max(start1, start2) < Math.min(end1, end2);
                    }

                    function matchesRecurrence(dateObj, baseDate, recurType) {
                        if (recurType === "None" || recurType === "" || !recurType) return true;
                        if (recurType === "Daily") return true;
                        if (recurType === "Weekly") {
                            return dateObj.getDay() === baseDate.getDay();
                        }
                        if (recurType === "Monthly") {
                            return dateObj.getDate() === baseDate.getDate();
                        }
                        return false;
                    }

                    function hasRecurrenceOverlap(start1, end1, recur1, start2, end2, recur2) {
                        if (Math.max(start1, start2) > Math.min(end1, end2)) {
                            return false;
                        }
                        if (recur1 === "None" && recur2 === "None") {
                            return true;
                        }

                        let curr = new Date(Math.max(start1, start2));
                        let boundary = new Date(Math.min(end1, end2));
                        while (curr <= boundary) {
                            if (matchesRecurrence(curr, new Date(start1), recur1) &&
                                matchesRecurrence(curr, new Date(start2), recur2)) {
                                return true;
                            }
                            curr.setDate(curr.getDate() + 1);
                        }
                        return false;
                    }

                    function getHierarchy(name) {
                        let workspaces = [];
                        try {
                            workspaces = JSON.parse(sessionStorage.getItem("workspaces") || "[]");
                        } catch (e) { }

                        let roomsList = [];
                        try {
                            roomsList = JSON.parse(sessionStorage.getItem("rooms_list") || "[]");
                        } catch (e) { }

                        const wMatch = workspaces.find(w => w.name === name);
                        const isParent = wMatch && !wMatch.parentWorkspace;

                        let parent = null;
                        let childrenWorkspaces = [];
                        let childrenRooms = [];

                        if (isParent) {
                            parent = name;
                            childrenWorkspaces = workspaces.filter(w => w.parentWorkspace === name).map(w => w.name);
                            childrenRooms = roomsList.filter(r => r.parentWorkspace === name).map(r => r.name);
                        } else {
                            if (wMatch && wMatch.parentWorkspace) {
                                parent = wMatch.parentWorkspace;
                            } else {
                                const rMatch = roomsList.find(r => r.name === name);
                                if (rMatch && rMatch.parentWorkspace) {
                                    parent = rMatch.parentWorkspace;
                                }
                            }
                            if (parent) {
                                childrenWorkspaces = workspaces.filter(w => w.parentWorkspace === parent).map(w => w.name);
                                childrenRooms = roomsList.filter(r => r.parentWorkspace === parent).map(r => r.name);
                            }
                        }
                        return { parent, childrenWorkspaces, childrenRooms };
                    }

                    function getOverlappingBookings(roomName, reqTerm, reqStartD, reqEndD, reqStartTime, reqEndTime, reqRecur, list) {
                        let overlaps = [];
                        if (list && list.length > 0) {
                            const reqStartTMin = reqStartTime ? parseTimeToMinutes(reqStartTime) : 0;
                            const reqEndTMin = reqEndTime ? parseTimeToMinutes(reqEndTime) : 1440;

                            overlaps = list.filter(b => {
                                if (b.status !== "Confirmed" || b.room.trim() !== roomName.trim()) {
                                    return false;
                                }

                                const bPeriod = parsePeriod(b);
                                if (!hasRecurrenceOverlap(reqStartD.getTime(), reqEndD.getTime(), reqRecur, bPeriod.start.getTime(), bPeriod.end.getTime(), b.recurring || "None")) {
                                    return false;
                                }

                                if (reqTerm === "Hourly" && b.term === "Hourly") {
                                    const parts = b.time.split(" - ");
                                    if (parts.length === 2) {
                                        const bStartMin = parseTimeSlotToMinutes(parts[0]);
                                        const bEndMin = parseTimeSlotToMinutes(parts[1]);
                                        return isTimeOverlapping(reqStartTMin, reqEndTMin, bStartMin, bEndMin);
                                    }
                                    return true;
                                }
                                return true;
                            });
                        }

                        if (overlaps.length > 0) {
                            return overlaps;
                        }

                        // Check parent workspace Entire Space blocks
                        const hierarchy = getHierarchy(roomName);
                        if (hierarchy.parent) {
                            let workspaceBookings = [];
                            try {
                                workspaceBookings = JSON.parse(sessionStorage.getItem("workspace_bookings") || "[]");
                            } catch (e) { }

                            const parentBlock = workspaceBookings.filter(o => {
                                if (o.status !== "Confirmed" || o.workspace !== hierarchy.parent || o.bookingScope !== "Entire") return false;

                                const parts = o.period.split(" - ");
                                let start, end;
                                if (parts.length === 2) {
                                    start = new Date(parts[0] + "T00:00:00");
                                    end = new Date(parts[1] + "T23:59:59");
                                } else {
                                    start = new Date(o.period + "T00:00:00");
                                    end = new Date(o.period + "T23:59:59");
                                }

                                return hasRecurrenceOverlap(reqStartD.getTime(), reqEndD.getTime(), reqRecur, start.getTime(), end.getTime(), o.recurring || "None");
                            });

                            if (parentBlock.length > 0) {
                                return [{
                                    id: 9999,
                                    booker: parentBlock[0].booker,
                                    room: roomName,
                                    term: parentBlock[0].term,
                                    date: parentBlock[0].period,
                                    time: "Full Day",
                                    status: "Confirmed",
                                    recurring: parentBlock[0].recurring
                                }];
                            }
                        }

                        return [];
                    }

                    async function submitRoomBooking(e) {
                        e.preventDefault();

                        const title = document.getElementById("book_title").value.trim();
                        const term = document.getElementById("book_term").value;
                        const recurring = document.getElementById("book_recurring").value;

                        const r = rooms.find(x => x.id === selectedRoomId);
                        if (!r) return;

                        const profile = JSON.parse(sessionStorage.getItem("profile") || '{"name":"Alex Rivera"}');
                        const booker = profile.name || "Alex Rivera";

                        let dateRangeStr = "";
                        let timeRangeStr = "";
                        let durationStr = "1 Hour";
                        let reqStartD, reqEndD;
                        let reqStartT = null;
                        let reqEndT = null;

                        const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };

                        if (term === "Hourly") {
                            const rawDate = document.getElementById("book_date").value;
                            reqStartT = document.getElementById("book_start").value;
                            reqEndT = document.getElementById("book_end").value;

                            if (!rawDate || !reqStartT || !reqEndT) {
                                alert("Please fill in hourly date and time slots.");
                                return;
                            }

                            // Validate start time < end time
                            const startMin = parseTimeToMinutes(reqStartT);
                            const endMin = parseTimeToMinutes(reqEndT);
                            if (startMin >= endMin) {
                                alert("Start time must be before end time!");
                                return;
                            }

                            reqStartD = new Date(rawDate + "T00:00:00");
                            reqEndD = new Date(rawDate + "T23:59:59");
                            dateRangeStr = reqStartD.toLocaleDateString('en-US', dateOptions);

                            const formatTimeAMPM = (timeStr) => {
                                const [hours, minutes] = timeStr.split(":");
                                let hh = parseInt(hours);
                                const suffix = hh >= 12 ? "PM" : "AM";
                                hh = hh % 12 || 12;
                                return `${hh}:${minutes} ${suffix}`;
                            };
                            timeRangeStr = `${formatTimeAMPM(reqStartT)} - ${formatTimeAMPM(reqEndT)}`;

                            try {
                                const diff = (endMin - startMin) / 60;
                                if (diff > 0) {
                                    durationStr = diff === 1 ? "1 Hour" : `${diff} Hours`;
                                }
                            } catch (err) { }
                        } else {
                            const rawStart = document.getElementById("book_start_date").value;
                            const rawEnd = document.getElementById("book_end_date").value;

                            if (!rawStart || !rawEnd) {
                                alert("Please select start and end dates.");
                                return;
                            }

                            reqStartD = new Date(rawStart + "T00:00:00");
                            reqEndD = new Date(rawEnd + "T23:59:59");

                            if (reqEndD < reqStartD) {
                                alert("End Date cannot be before Start Date.");
                                return;
                            }

                            dateRangeStr = `${reqStartD.toLocaleDateString('en-US', dateOptions)} - ${reqEndD.toLocaleDateString('en-US', dateOptions)}`;
                            timeRangeStr = "Full Day";
                            durationStr = "All Day";
                        }

                        // Load bookings
                        let bookingsStored = sessionStorage.getItem("bookings");
                        let bookingsList = [];
                        if (bookingsStored) {
                            bookingsList = JSON.parse(bookingsStored);
                        } else {
                            try {
                                const res = await fetch("data/bookings.json");
                                bookingsList = await res.json();
                                sessionStorage.setItem("bookings", JSON.stringify(bookingsList));
                            } catch (err) {
                                bookingsList = [];
                            }
                        }

                        const overlaps = getOverlappingBookings(r.name, term, reqStartD, reqEndD, reqStartT, reqEndT, recurring, bookingsList);
                        if (overlaps.length > 0) {
                            const over = overlaps[0];
                            alert(`Overlap conflict detected! ${r.name.replace(/\s*\((Int|Ext)\)/i, "")} is already booked by ${over.booker} (${over.term} cycle) during this time.`);
                            return;
                        }

                        // Save booking
                        const newId = bookingsList.length > 0 ? Math.max(...bookingsList.map(x => x.id)) + 1 : 1;
                        const newBooking = {
                            id: newId,
                            booker: booker,
                            title: title,
                            room: r.name,
                            term: term,
                            date: dateRangeStr,
                            time: timeRangeStr,
                            duration: durationStr,
                            recurring: recurring,
                            status: "Confirmed",
                            image: r.image || "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80"
                        };

                        bookingsList.unshift(newBooking);
                        sessionStorage.setItem("bookings", JSON.stringify(bookingsList));

                        alert("Room booked successfully.");
                        closeRoomBookingModal();
                    }

                    loadRooms();

                    window.handleSearch = handleSearch;
                    window.handleTermChange = handleTermChange;
                    window.openRoomBookingModal = openRoomBookingModal;
                    window.closeRoomBookingModal = closeRoomBookingModal;
                    window.triggerRoomBookingSubmit = triggerRoomBookingSubmit;
                    window.submitRoomBooking = submitRoomBooking;
                })();
        </script>
    </main>
