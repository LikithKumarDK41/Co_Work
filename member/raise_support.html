    <style>
        /* Custom styles for hidden radio inputs to create chip styling */
        input[type="radio"]:checked+label.priority-chip {
            background-color: #000000;
            color: #ffffff;
            border-color: #000000;
        }
    </style>
    <script src="layout.js" defer></script>

<body
    class="bg-background text-on-background font-body-md text-body-md min-h-screen flex flex-col md:flex-row antialiased">
    <!-- Main Content Area -->
    <main class="page-layout flex-1 md:ml-64 bg-background">
        <div class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg md:py-section-gap">
            <!-- Page Header -->
            <header class="mb-stack-lg">
                <h1
                    class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">
                    Raise a Ticket</h1>
                <p class="font-body-md text-body-md text-on-surface-variant mt-2">Submit your request below. Our support
                    team will review and respond promptly.</p>
            </header>
            <!-- Support Form -->
            <form
                class="bg-surface-container-lowest shadow-[0px_4px_20px_rgba(0,0,0,0.04)] rounded-xl p-6 md:p-10 border border-surface-variant">
                <div class="space-y-stack-lg">
                    <!-- Subject Field -->
                    <div class="flex flex-col gap-base">
                        <label class="font-label-md text-label-md text-on-surface" for="subject">Subject</label>
                        <input
                            class="bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            id="subject" name="subject" placeholder="Brief summary of the issue" type="text">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-stack-lg">
                        <!-- Category Dropdown -->
                        <div class="flex flex-col gap-base">
                            <label class="font-label-md text-label-md text-on-surface" for="category">Category</label>
                            <div class="relative">
                                <select
                                    class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer"
                                    id="category" name="category">
                                    <option disabled="" selected="" value="">Select category</option>
                                    <option value="facilities">Facilities &amp; Cleaning</option>
                                    <option value="it">IT &amp; Network</option>
                                    <option value="billing">Billing &amp; Membership</option>
                                    <option value="events">Events &amp; Catering</option>
                                    <option value="other">Other</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                            </div>
                        </div>
                        <!-- Priority Selection (Chips) -->
                        <div class="flex flex-col gap-base">
                            <label class="font-label-md text-label-md text-on-surface">Priority</label>
                            <div class="flex gap-3 h-full items-center">
                                <div class="flex-1">
                                    <input class="hidden" id="priority-low" name="priority" type="radio" value="low">
                                    <label
                                        class="priority-chip flex items-center justify-center w-full bg-surface border border-outline-variant rounded-lg py-3 px-4 font-label-md text-label-md text-on-surface-variant cursor-pointer transition-colors hover:bg-surface-container-low"
                                        for="priority-low">Low</label>
                                </div>
                                <div class="flex-1">
                                    <input checked="" class="hidden" id="priority-medium" name="priority" type="radio"
                                        value="medium">
                                    <label
                                        class="priority-chip flex items-center justify-center w-full bg-surface border border-outline-variant rounded-lg py-3 px-4 font-label-md text-label-md text-on-surface-variant cursor-pointer transition-colors hover:bg-surface-container-low"
                                        for="priority-medium">Medium</label>
                                </div>
                                <div class="flex-1">
                                    <input class="hidden" id="priority-high" name="priority" type="radio" value="high">
                                    <label
                                        class="priority-chip flex items-center justify-center w-full bg-surface border border-outline-variant rounded-lg py-3 px-4 font-label-md text-label-md text-on-surface-variant cursor-pointer transition-colors hover:bg-surface-container-low"
                                        for="priority-high">High</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Description Field -->
                    <div class="flex flex-col gap-base">
                        <label class="font-label-md text-label-md text-on-surface" for="description">Description</label>
                        <textarea
                            class="bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-y"
                            id="description" name="description"
                            placeholder="Provide as much detail as possible to help us resolve the issue quickly..."
                            rows="5"></textarea>
                    </div>
                    <!-- Attachment Upload -->
                    <div class="flex flex-col gap-base">
                        <label class="font-label-md text-label-md text-on-surface">Attachment (Optional)</label>
                        <div
                            class="border-2 border-dashed border-outline-variant rounded-lg p-8 flex flex-col items-center justify-center bg-surface hover:bg-surface-container-low transition-colors cursor-pointer group">
                            <span
                                class="material-symbols-outlined text-outline text-3xl mb-3 group-hover:text-primary transition-colors">cloud_upload</span>
                            <span class="font-label-md text-label-md text-on-surface mb-1">Click to upload or drag and
                                drop</span>
                            <span class="font-label-sm text-label-sm text-on-surface-variant font-normal">PNG, JPG, PDF
                                up to 10MB</span>
                            <input class="hidden" id="file-upload" type="file">
                        </div>
                    </div>
                </div>
                <!-- Form Actions -->
                <div
                    class="mt-section-gap flex flex-col-reverse md:flex-row justify-end gap-4 border-t border-outline-variant pt-stack-lg">
                    <button
                        class="px-6 py-3 border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg hover:bg-surface-container-low transition-colors"
                        type="button">
                        Cancel
                    </button>
                    <button
                        class="px-8 py-3 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 transition-opacity shadow-sm flex justify-center items-center gap-2"
                        type="submit">
                        Submit Ticket
                        <span class="material-symbols-outlined text-[18px]">send</span>
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script>
        // Simple script to handle visual interaction for the file dropzone
        const dropzone = document.querySelector('.border-dashed');
        const fileInput = document.getElementById('file-upload');

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-primary', 'bg-surface-container-low');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-primary', 'bg-surface-container-low');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-primary', 'bg-surface-container-low');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                // Add minor visual feedback
                const textSpan = dropzone.querySelector('span:nth-child(2)');
                textSpan.textContent = `Selected: ${e.dataTransfer.files[0].name}`;
                textSpan.classList.add('text-primary');
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                const textSpan = dropzone.querySelector('span:nth-child(2)');
                textSpan.textContent = `Selected: ${e.target.files[0].name}`;
                textSpan.classList.add('text-primary');
            }
        });
    </script>


</body>

</html>
