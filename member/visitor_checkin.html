    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf9f9;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .ambient-shadow {
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.04);
        }

        .ambient-shadow-hover:hover {
            box-shadow: 0px 8px 30px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
            transition: all 0.2s ease;
        }
    </style>
    <script src="layout.js" defer></script>

<body class="bg-background text-on-surface font-body-md min-h-screen flex antialiased">
    <main
        class="page-layout flex-1 w-full flex justify-center items-center p-margin-mobile md:p-margin-desktop min-h-screen">
        <div
            class="max-w-2xl w-full bg-surface-container-lowest ambient-shadow rounded-xl p-stack-lg flex flex-col items-center text-center">
            <!-- Success Indicator -->
            <div class="w-20 h-20 rounded-full bg-secondary-container flex items-center justify-center mb-stack-md">
                <span class="material-symbols-outlined icon-fill text-on-secondary-container"
                    style="font-size: 40px;">check_circle</span>
            </div>
            <!-- Headline -->
            <h1
                class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-stack-sm">
                Visitor Checked In Successfully
            </h1>
            <p class="font-body-md text-body-md text-on-surface-variant mb-section-gap max-w-md">
                Please provide the visitor with their access badge or direct them to scan the QR code below for digital
                entry.
            </p>
            <!-- Visitor Details & QR Layout -->
            <div
                class="w-full flex flex-col md:flex-row gap-gutter border border-outline-variant rounded-lg p-stack-md text-left mb-section-gap bg-surface">
                <!-- Details List -->
                <div
                    class="flex-1 flex flex-col justify-center gap-stack-md pr-gutter md:border-r border-outline-variant">
                    <div>
                        <p class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Visitor Name</p>
                        <p class="font-body-lg text-body-lg text-primary">Eleanor Vance</p>
                    </div>
                    <hr class="border-t border-outline-variant opacity-50" />
                    <div>
                        <p class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Company</p>
                        <p class="font-body-lg text-body-lg text-primary">Hill House Architecture</p>
                    </div>
                    <hr class="border-t border-outline-variant opacity-50" />
                    <div>
                        <p class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Arrival Time</p>
                        <p class="font-body-lg text-body-lg text-primary">10:15 AM</p>
                    </div>
                </div>
                <!-- QR Code Section -->
                <div
                    class="flex flex-col items-center justify-center pt-stack-md md:pt-0 pl-0 md:pl-gutter min-w-[200px]">
                    <img alt="Visitor QR Code"
                        class="w-40 h-40 object-cover border border-outline-variant rounded mb-stack-sm"
                        src="https://lh3.googleusercontent.com/aida/AP1WRLs6NS7lnbG2KKlIrEUCLLiiT-B-RSSFunwenobew8vHWDFI3Hd5jd_kkMgVxLybVNJmv9PbLP5-YMguqAeLyhVtdtDCLhsASEILxrQV1cGs_vjUkqxgNg55Xxh7BfUn3E15xW-dV0a2gzo36_38Aupq6UfvwF0iBF96UI5_pFvSNj10M6TNAOhDrla0K2G93llVRvIumzpea3EP874l7gKtiTECOwtdOANyDTj0Zhi2Ghm4ekBSw1TJ81Bo" />
                    <p class="font-label-md text-label-md text-on-surface-variant text-center">Scan for Access</p>
                </div>
            </div>
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-stack-md w-full justify-center">
                <button
                    class="flex items-center justify-center gap-2 bg-primary text-on-primary font-label-md text-label-md px-6 py-3 rounded-lg hover:bg-surface-tint transition-colors duration-200 w-full sm:w-auto">
                    <span class="material-symbols-outlined text-[20px]">print</span>
                    Print Badge
                </button>
                <a class="flex items-center justify-center gap-2 bg-transparent border border-outline text-primary font-label-md text-label-md px-6 py-3 rounded-lg hover:bg-surface-variant transition-colors duration-200 w-full sm:w-auto text-center"
                    href="visitor_history.html">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                    Back to Visitor History
                </a>
            </div>
        </div>
    </main>
</body>

</html>
